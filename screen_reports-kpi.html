<div data-screen="reports-kpi">
<!-- TopAppBar -->
<header class="flex justify-between items-center px-margin-edge w-full h-nav-height z-50 bg-surface dark:bg-surface-dim docked full-width top-0 shadow-sm border-b border-outline-variant dark:border-outline sticky">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-primary-container text-on-primary-container flex items-center justify-center font-title-main-mobile text-title-main-mobile" data-user-avatar>JD</div>
<h1 class="font-title-main-mobile text-title-main-mobile font-bold text-primary dark:text-primary-fixed-dim tracking-tight">Reports</h1>
</div>
<div class="flex items-center gap-2">
<button aria-label="Notifications" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-high transition-colors text-on-surface-variant active:scale-95 relative" data-action="notifications">
<span class="material-symbols-outlined">notifications</span>
<span class="absolute top-2 right-2 w-2 h-2 bg-error rounded-full"></span>
</button>
</div>
</header>
<main class="p-margin-edge flex flex-col gap-6 max-w-5xl mx-auto">
<!-- Time Filter -->
<section class="flex bg-surface-container-low rounded-xl p-1 shadow-inner overflow-x-auto no-scrollbar" data-filter-row>
<button class="period-btn flex-1 py-2 px-4 rounded-lg font-label-bold text-label-bold text-on-surface-variant hover:bg-surface-container-high transition-colors whitespace-nowrap" data-period="daily">Daily</button>
<button class="period-btn flex-1 py-2 px-4 rounded-lg font-label-bold text-label-bold text-on-surface-variant hover:bg-surface-container-high transition-colors whitespace-nowrap" data-period="weekly">Weekly</button>
<button class="period-btn flex-1 py-2 px-4 rounded-lg bg-surface-container-lowest shadow-sm font-label-bold text-label-bold text-primary transition-colors whitespace-nowrap" data-period="monthly">Monthly</button>
</section>
<!-- KPI Overview (Bento Grid) -->
<section class="bento-grid">
<div class="bento-card flex flex-col gap-2 relative overflow-hidden border-l-4 border-[#4F46E5]">
<div class="flex items-center gap-2 text-on-surface-variant">
<span class="material-symbols-outlined text-[18px]">schedule</span>
<span class="font-label-bold text-label-bold">Total Hours</span>
</div>
<div class="font-timer-display text-timer-display text-primary" data-area="kpi-total-hours">—</div>
<div class="text-xs text-[#10B981] flex items-center gap-1 font-body-standard text-body-standard" data-kpi-hours-trend></div>
<div class="absolute -right-4 -bottom-4 opacity-5"><span class="material-symbols-outlined text-[80px]">schedule</span></div>
</div>
<div class="bento-card flex flex-col gap-2 relative overflow-hidden border-l-4 border-[#10B981]">
<div class="flex items-center gap-2 text-on-surface-variant">
<span class="material-symbols-outlined text-[18px]">task_alt</span>
<span class="font-label-bold text-label-bold">Tasks Completed</span>
</div>
<div class="font-timer-display text-timer-display text-on-surface" data-area="kpi-tasks-completed">—</div>
<div class="text-xs text-[#10B981] flex items-center gap-1 font-body-standard text-body-standard" data-kpi-tasks-trend></div>
<div class="absolute -right-4 -bottom-4 opacity-5"><span class="material-symbols-outlined text-[80px]">task_alt</span></div>
</div>
<div class="bento-card flex flex-col gap-2 relative overflow-hidden border-l-4 border-[#4F46E5]">
<div class="flex items-center gap-2 text-on-surface-variant">
<span class="material-symbols-outlined text-[18px]">bolt</span>
<span class="font-label-bold text-label-bold">Efficiency %</span>
</div>
<div class="font-timer-display text-timer-display text-on-surface" data-area="kpi-efficiency">—</div>
<div class="text-xs text-on-surface-variant flex items-center gap-1 font-body-standard text-body-standard" data-kpi-efficiency-trend></div>
<div class="absolute -right-4 -bottom-4 opacity-5"><span class="material-symbols-outlined text-[80px]">bolt</span></div>
</div>
<div class="bento-card flex flex-col gap-2 relative overflow-hidden border-l-4 border-[#DC2626]">
<div class="flex items-center gap-2 text-on-surface-variant">
<span class="material-symbols-outlined text-[18px]">timer</span>
<span class="font-label-bold text-label-bold">Active Timers</span>
</div>
<div class="font-timer-display text-timer-display text-[#DC2626]" data-area="kpi-active-timers">—</div>
<div class="text-xs text-on-surface-variant flex items-center gap-1 font-body-standard text-body-standard" data-kpi-timers-note></div>
<div class="absolute -right-4 -bottom-4 opacity-5"><span class="material-symbols-outlined text-[80px]">timer</span></div>
</div>
</section>
<!-- Charts Section -->
<section class="bento-grid">
<!-- Hours by Client -->
<div class="bento-card bento-card-large bento-card-medium flex flex-col gap-4">
<h2 class="font-title-main-mobile text-title-main-mobile">Hours by Client</h2>
<div class="flex flex-col gap-3" data-area="chart-hours-by-client">
<div class="space-y-2 w-full"><div class="tf-skeleton h-3 w-3/4"></div><div class="tf-skeleton h-3 w-2/3 opacity-80"></div><div class="tf-skeleton h-3 w-1/2 opacity-60"></div></div>
</div>
</div>
<!-- Team Productivity -->
<div class="bento-card bento-card-large bento-card-medium flex flex-col gap-4">
<h2 class="font-title-main-mobile text-title-main-mobile">Team Productivity</h2>
<div class="flex items-end gap-2 h-32 mt-auto" data-area="chart-team-productivity">
<div class="space-y-2 w-full"><div class="tf-skeleton h-3 w-3/4"></div><div class="tf-skeleton h-3 w-2/3 opacity-80"></div><div class="tf-skeleton h-3 w-1/2 opacity-60"></div></div>
</div>
</div>
</div>
<!-- Category Split -->
<div class="bento-card bento-card-large flex flex-col gap-4">
<h2 class="font-title-main-mobile text-title-main-mobile">Category Split</h2>
<div class="flex flex-wrap gap-4 items-center justify-center" data-area="chart-category-split">
<div class="space-y-2 w-full"><div class="tf-skeleton h-3 w-3/4"></div><div class="tf-skeleton h-3 w-2/3 opacity-80"></div><div class="tf-skeleton h-3 w-1/2 opacity-60"></div></div>
</div>
</div>
</section>
<!-- By User Performance -->
<section class="flex flex-col gap-4">
  <div class="flex items-center justify-between px-1">
    <h2 class="font-title-main-mobile text-title-main-mobile">By User</h2>
    <div class="flex bg-surface-container-low rounded-lg p-0.5" data-perf-period-row>
      <button class="perf-period-btn px-3 py-1 rounded-md font-label-bold text-label-bold text-on-surface-variant transition-colors" data-perf-period="day">Today</button>
      <button class="perf-period-btn px-3 py-1 rounded-md font-label-bold text-label-bold bg-surface-container-lowest shadow-sm text-primary transition-colors" data-perf-period="week">Week</button>
      <button class="perf-period-btn px-3 py-1 rounded-md font-label-bold text-label-bold text-on-surface-variant transition-colors" data-perf-period="month">Month</button>
    </div>
  </div>
  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3" data-area="perf-by-user">
    <div class="space-y-2 w-full"><div class="tf-skeleton h-3 w-3/4"></div><div class="tf-skeleton h-3 w-2/3 opacity-80"></div><div class="tf-skeleton h-3 w-1/2 opacity-60"></div></div>
  </div>
  <div data-area="perf-detail" class="hidden bg-surface-container-lowest rounded-xl p-4 border border-outline-variant"></div>
</section>
<!-- Detailed List -->
<section class="flex flex-col gap-4 pb-20 md:pb-0">
<h2 class="font-title-main-mobile text-title-main-mobile px-1">Top Performers</h2>
<div class="flex flex-col gap-2" data-area="top-performers-list">
<div class="space-y-2 w-full"><div class="tf-skeleton h-3 w-3/4"></div><div class="tf-skeleton h-3 w-2/3 opacity-80"></div><div class="tf-skeleton h-3 w-1/2 opacity-60"></div></div>
</div>
</section>
</main>
<!-- BottomNavBar -->
<nav class="md:hidden flex justify-around items-center w-full h-nav-height px-2 bg-surface dark:bg-surface-dim fixed bottom-0 z-50 border-t border-outline-variant dark:border-outline shadow-lg">
<button class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-1 hover:bg-surface-container-low active:scale-90 transition-all duration-200" data-nav="kanban-home">
<span class="material-symbols-outlined">home</span>
<span class="font-label-bold text-label-bold">Home</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-1 hover:bg-surface-container-low active:scale-90 transition-all duration-200" data-nav="notifications">
<span class="material-symbols-outlined">notifications</span>
<span class="font-label-bold text-label-bold">Inbox</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-1 hover:bg-surface-container-low active:scale-90 transition-all duration-200" data-nav="quick-capture">
<span class="material-symbols-outlined">add_box</span>
<span class="font-label-bold text-label-bold">Quick</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-1 hover:bg-surface-container-low active:scale-90 transition-all duration-200" data-nav="admin-panel">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">settings</span>
<span class="font-label-bold text-label-bold">Admin</span>
</button>
<button class="flex flex-col items-center justify-center bg-secondary-container dark:bg-secondary-fixed-dim text-on-secondary-container dark:text-on-secondary-fixed rounded-2xl px-4 py-1 active:scale-90 transition-all duration-200">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">bar_chart</span>
<span class="font-label-bold text-label-bold">Reports</span>
</button>
</nav>
</div>

<script>
(function () {
  var _activePeriod = 'monthly';

  function escHtml(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function trendIcon(pct) {
    if (pct > 0) return '<span class="material-symbols-outlined text-[14px]">trending_up</span> +' + pct + '%';
    if (pct < 0) return '<span class="material-symbols-outlined text-[14px]">trending_down</span> ' + pct + '%';
    return '<span class="material-symbols-outlined text-[14px]">trending_flat</span> 0%';
  }

  function renderKpi(screen, kpi) {
    var hoursEl = screen.querySelector('[data-area="kpi-total-hours"]');
    var tasksEl = screen.querySelector('[data-area="kpi-tasks-completed"]');
    var effEl   = screen.querySelector('[data-area="kpi-efficiency"]');
    var timerEl = screen.querySelector('[data-area="kpi-active-timers"]');

    if (hoursEl) hoursEl.textContent = kpi.totalHours != null ? kpi.totalHours : '—';
    if (tasksEl) tasksEl.textContent = kpi.tasksCompleted != null ? kpi.tasksCompleted : '—';
    if (effEl)   effEl.textContent   = kpi.efficiency != null ? kpi.efficiency + '%' : '—';
    if (timerEl) timerEl.textContent = kpi.activeTimers != null ? kpi.activeTimers : '—';

    var hoursTrend = screen.querySelector('[data-kpi-hours-trend]');
    var tasksTrend = screen.querySelector('[data-kpi-tasks-trend]');
    var effTrend   = screen.querySelector('[data-kpi-efficiency-trend]');
    var timerNote  = screen.querySelector('[data-kpi-timers-note]');

    if (hoursTrend) hoursTrend.innerHTML = trendIcon(kpi.hoursTrend || 0);
    if (tasksTrend) tasksTrend.innerHTML = trendIcon(kpi.tasksTrend || 0);
    if (effTrend)   effTrend.innerHTML   = trendIcon(kpi.efficiencyTrend || 0);
    if (timerNote)  timerNote.textContent = kpi.timersNote || '';
  }

  function renderClientChart(screen, clientHours) {
    var area = screen.querySelector('[data-area="chart-hours-by-client"]');
    if (!area) return;
    if (!clientHours || !clientHours.length) { area.innerHTML = '<div class="text-on-surface-variant text-sm">No data</div>'; return; }
    var max = Math.max.apply(null, clientHours.map(function (c) { return c.hours; }));
    var colors = ['#4F46E5','#DC2626','#4F46E5','#10B981','#4F46E5'];
    area.innerHTML = clientHours.map(function (c, i) {
      var pct = max > 0 ? Math.round((c.hours / max) * 100) : 0;
      return '<div class="flex flex-col gap-1">' +
        '<div class="flex justify-between font-body-standard text-body-standard">' +
          '<span>' + escHtml(c.client) + '</span>' +
          '<span class="font-semibold">' + escHtml(String(c.hours)) + 'h</span>' +
        '</div>' +
        '<div class="w-full bg-surface-variant rounded-full h-2">' +
          '<div class="h-2 rounded-full" style="width:' + pct + '%;background:' + colors[i % colors.length] + '"></div>' +
        '</div></div>';
    }).join('');
  }

  function renderTeamChart(screen, memberStats) {
    var area = screen.querySelector('[data-area="chart-team-productivity"]');
    if (!area) return;
    if (!memberStats || !memberStats.length) { area.innerHTML = '<div class="text-on-surface-variant text-sm">No data</div>'; return; }
    var max = Math.max.apply(null, memberStats.map(function (m) { return m.hours || 0; }));
    // Rank members high→low to apply tiered opacity (top performer fully opaque)
    var ranked = memberStats.slice().sort(function (a, b) { return (b.hours || 0) - (a.hours || 0); });
    var rankMap = {};
    ranked.forEach(function (m, i) { rankMap[m.name] = i; });
    var opacityTiers = [1.0, 0.8, 0.6, 0.4];
    area.innerHTML = memberStats.map(function (m) {
      var pct = max > 0 ? Math.round(((m.hours || 0) / max) * 100) : 0;
      var rank = rankMap[m.name] || 0;
      var opacity = opacityTiers[Math.min(rank, opacityTiers.length - 1)];
      return '<div class="flex flex-col items-center flex-1 gap-2">' +
        '<div class="w-full bg-primary rounded-t-md" style="height:' + pct + '%;min-height:4px;opacity:' + opacity + '"></div>' +
        '<span class="font-label-bold text-label-bold text-on-surface-variant text-[10px]">' + escHtml(m.name || '') + '</span>' +
      '</div>';
    }).join('');
  }

  function renderTopPerformers(screen, memberStats) {
    var area = screen.querySelector('[data-area="top-performers-list"]');
    if (!area) return;
    if (!memberStats || !memberStats.length) { area.innerHTML = '<div class="text-on-surface-variant text-sm">No data</div>'; return; }
    var sorted = memberStats.slice().sort(function (a, b) { return (b.hours || 0) - (a.hours || 0); });
    var borderColors = ['#4F46E5','#10B981','#4F46E5','#DC2626'];
    area.innerHTML = sorted.map(function (m, i) {
      var initials = (m.name || '?').split(' ').map(function (w) { return w[0]; }).join('').toUpperCase().slice(0, 2);
      return '<div class="bg-surface-container-lowest rounded-xl p-4 flex items-center justify-between shadow-sm border-l-4" style="border-left-color:' + borderColors[i % borderColors.length] + '">' +
        '<div class="flex items-center gap-3">' +
          (m.avatar
            ? '<img alt="' + escHtml(m.name || 'User') + '" class="w-10 h-10 rounded-full object-cover" src="' + escHtml(m.avatar) + '"/>'
            : '<div class="w-10 h-10 rounded-full bg-primary-container text-on-primary-container flex items-center justify-center font-bold">' + escHtml(initials) + '</div>') +
          '<div>' +
            '<div class="font-body-standard text-body-standard font-semibold">' + escHtml(m.name) + '</div>' +
            '<div class="font-label-bold text-label-bold text-on-surface-variant">' + escHtml(m.role || '') + '</div>' +
          '</div>' +
        '</div>' +
        '<div class="text-right">' +
          '<div class="font-body-standard text-body-standard font-semibold">' + escHtml(String(m.hours || 0)) + 'h logged</div>' +
          '<div class="font-label-bold text-label-bold text-[#10B981]">' + escHtml(m.efficiency != null ? m.efficiency + '% Efficiency' : '') + '</div>' +
        '</div></div>';
    }).join('');
  }

  var CATEGORY_COLORS = ['#10B981','#4F46E5','#4F46E5','#DC2626','#4F46E5','#4F46E5','#4F46E5'];

  function renderCategoryChart(screen, categories) {
    var area = screen.querySelector('[data-area="chart-category-split"]');
    if (!area) return;
    if (!categories || !categories.length) {
      area.innerHTML = '<div class="text-on-surface-variant text-sm w-full text-center">No category data</div>';
      return;
    }
    var total = categories.reduce(function(s, c) { return s + (c.count || 0); }, 0);
    var legend = categories.map(function(c, i) {
      var pct = total > 0 ? Math.round((c.count / total) * 100) : 0;
      return '<div class="flex items-center gap-2 font-body-standard text-body-standard">' +
        '<span class="w-3 h-3 rounded-full shrink-0" style="background:' + CATEGORY_COLORS[i % CATEGORY_COLORS.length] + '"></span>' +
        escHtml(c.name || c.category || 'Other') + ' (' + pct + '%)' +
      '</div>';
    }).join('');
    area.innerHTML =
      '<div class="flex flex-col gap-2 w-full">' +
        categories.map(function(c, i) {
          var pct = total > 0 ? Math.round((c.count / total) * 100) : 0;
          return '<div class="flex flex-col gap-1">' +
            '<div class="flex justify-between font-body-standard text-body-standard">' +
              '<span>' + escHtml(c.name || c.category || 'Other') + '</span>' +
              '<span class="font-semibold">' + pct + '%</span>' +
            '</div>' +
            '<div class="w-full bg-surface-variant rounded-full h-2">' +
              '<div class="h-2 rounded-full" style="width:' + pct + '%;background:' + CATEGORY_COLORS[i % CATEGORY_COLORS.length] + '"></div>' +
            '</div></div>';
        }).join('') +
      '</div>' +
      '<div class="flex flex-wrap gap-3 mt-2">' + legend + '</div>';
  }

  function buildCategoryFromTasks(tasks) {
    var map = {};
    (tasks || []).forEach(function(t) {
      var cat = (t.category && (t.category.name || t.category)) || t.type || 'Other';
      if (typeof cat !== 'string') cat = 'Other';
      map[cat] = (map[cat] || 0) + 1;
    });
    return Object.keys(map).map(function(k) { return { name: k, count: map[k] }; })
      .sort(function(a, b) { return b.count - a.count; });
  }

  var _activePerfPeriod = 'week';

  function scoreColor(s) {
    if (s >= 80) return '#10B981';
    if (s >= 60) return '#F59E0B';
    return '#DC2626';
  }
  function deltaArrow(d) {
    if (d == null) return '<span class="text-on-surface-variant">▬</span>';
    if (d > 0) return '<span style="color:#10B981">▲ ' + d + '</span>';
    if (d < 0) return '<span style="color:#DC2626">▼ ' + Math.abs(d) + '</span>';
    return '<span class="text-on-surface-variant">▬ 0</span>';
  }
  function initialsOf(name) {
    return (name || '?').split(' ').map(function(w){ return w[0]; }).join('').toUpperCase().slice(0, 2);
  }

  function renderUserPerfDetail(screen, perf) {
    var box = screen.querySelector('[data-area="perf-detail"]');
    if (!box) return;
    box.classList.remove('hidden');
    box.innerHTML =
      '<div class="flex items-center justify-between mb-3">' +
        '<div class="font-title-main-mobile text-title-main-mobile">' + escHtml(perf.name) + ' — Score ' + (perf.score || 0) + '</div>' +
        '<button class="text-on-surface-variant text-sm" data-action="perf-detail-close">Close</button>' +
      '</div>' +
      '<div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-3">' +
        '<div><div class="text-xs text-on-surface-variant">On-time</div><div class="font-body-standard font-semibold">' + (perf.onTimeRate || 0) + '%</div></div>' +
        '<div><div class="text-xs text-on-surface-variant">Completion</div><div class="font-body-standard font-semibold">' + (perf.completionRate || 0) + '%</div></div>' +
        '<div><div class="text-xs text-on-surface-variant">Overdue</div><div class="font-body-standard font-semibold">' + (perf.tasksOverdue || 0) + '</div></div>' +
        '<div><div class="text-xs text-on-surface-variant">Minutes</div><div class="font-body-standard font-semibold">' + (perf.minutesLogged || 0) + '</div></div>' +
      '</div>' +
      '<div class="text-xs text-on-surface-variant">Completed: ' + (perf.tasksCompleted || 0) + ' · Assigned: ' + (perf.tasksAssigned || 0) +
        (perf.avgCycleMinutes != null ? ' · Avg cycle: ' + perf.avgCycleMinutes + 'm' : '') + '</div>';
  }

  function renderPerfByUser(screen, users, period) {
    var area = screen.querySelector('[data-area="perf-by-user"]');
    if (!area) return;
    if (!users || !users.length) { area.innerHTML = '<div class="text-on-surface-variant text-sm">No users.</div>'; return; }
    area.innerHTML = '<div class="space-y-2 w-full col-span-full"><div class="tf-skeleton h-3 w-3/4"></div><div class="tf-skeleton h-3 w-2/3 opacity-80"></div></div>';
    var promises = users.map(function(u) {
      return APP.call('getUserPerformance', u.id, period, null, APP.token).catch(function() {
        return { userId: u.id, name: u.name, score: 0, onTimeRate: 0, tasksCompleted: 0, minutesLogged: 0, deltaFromPrevious: null };
      });
    });
    Promise.all(promises).then(function(results) {
      area.innerHTML = results.map(function(p) {
        var col = scoreColor(p.score || 0);
        return '<button type="button" class="text-left bg-surface-container-lowest rounded-xl p-3 border border-outline-variant hover:shadow-md transition-shadow flex flex-col gap-2" data-perf-uid="' + escHtml(p.userId) + '">' +
          '<div class="flex items-center gap-2">' +
            '<div class="w-9 h-9 rounded-full bg-primary-container text-on-primary-container flex items-center justify-center font-bold text-[12px]">' + escHtml(initialsOf(p.name)) + '</div>' +
            '<div class="flex-1 min-w-0">' +
              '<div class="font-body-standard text-body-standard font-semibold truncate">' + escHtml(p.name || '') + '</div>' +
              '<div class="text-[11px] text-on-surface-variant">' + (p.tasksCompleted || 0) + ' done · ' + (p.minutesLogged || 0) + 'm</div>' +
            '</div>' +
            '<div class="px-2 py-0.5 rounded-full text-white text-[12px] font-bold" style="background:' + col + '">' + (p.score || 0) + '</div>' +
          '</div>' +
          '<div class="flex items-center justify-between text-[11px]">' +
            '<span class="text-on-surface-variant">On-time ' + (p.onTimeRate || 0) + '%</span>' +
            '<span>' + deltaArrow(p.deltaFromPrevious) + '</span>' +
          '</div>' +
        '</button>';
      }).join('');
    });
  }

  function setActivePerfPeriodBtn(screen, period) {
    screen.querySelectorAll('.perf-period-btn').forEach(function(btn) {
      var isActive = btn.dataset.perfPeriod === period;
      btn.classList.toggle('bg-surface-container-lowest', isActive);
      btn.classList.toggle('shadow-sm', isActive);
      btn.classList.toggle('text-primary', isActive);
      btn.classList.toggle('text-on-surface-variant', !isActive);
    });
  }

  function loadPerfData(screen, period) {
    APP.call('getTeamMembers', APP.token).then(function(users) {
      renderPerfByUser(screen, users || [], period);
    }).catch(function() {});
  }

  function loadData(screen, period) {
    // KPI summary (filtered by period)
    APP.call('getKpiByFilter', period, APP.token).then(function (kpi) {
      renderKpi(screen, kpi || {});
      // If KPI response includes category breakdown, use it
      if (kpi && kpi.categoryBreakdown && kpi.categoryBreakdown.length) {
        renderCategoryChart(screen, kpi.categoryBreakdown);
      }
    }).catch(function (err) { APP.showError(err); });

    APP.call('getHoursByClient', APP.token).then(function (clientHours) {
      renderClientChart(screen, clientHours || []);
    }).catch(function (err) { APP.showError(err); });

    APP.call('getTeamProductivity', APP.token).then(function (memberStats) {
      renderTeamChart(screen, memberStats || []);
      renderTopPerformers(screen, memberStats || []);
    }).catch(function (err) { APP.showError(err); });

    // Load tasks to derive category breakdown if backend doesn't provide it
    APP.call('getTasks', null, APP.token).then(function(tasks) {
      // Only use task-derived data if not already populated by KPI response
      var area = screen.querySelector('[data-area="chart-category-split"]');
      if (area && area.querySelector('.tf-skeleton')) {
        renderCategoryChart(screen, buildCategoryFromTasks(tasks));
      }
    }).catch(function() { /* non-critical */ });
  }

  function setActivePeriodBtn(screen, period) {
    screen.querySelectorAll('.period-btn').forEach(function (btn) {
      var isActive = btn.dataset.period === period;
      btn.classList.toggle('bg-surface-container-lowest', isActive);
      btn.classList.toggle('shadow-sm', isActive);
      btn.classList.toggle('text-primary', isActive);
      btn.classList.toggle('text-on-surface-variant', !isActive);
    });
  }

  APP.register('reports-kpi', {
    mount: function (params) {
      if (!APP.currentUser) { APP.navigate('pin-login'); return; }
      var screen = document.querySelector('[data-screen="reports-kpi"]');

      // user avatar initials
      var avEl = screen.querySelector('[data-user-avatar]');
      if (avEl && APP.currentUser) {
        avEl.textContent = (APP.currentUser.name || 'JD').split(' ').map(function (w) { return w[0]; }).join('').toUpperCase().slice(0, 2);
      }

      screen._clickHandler = function (e) {
        var nav = e.target.closest('[data-nav]');
        if (nav) { APP.navigate(nav.dataset.nav); return; }

        var periodBtn = e.target.closest('.period-btn');
        if (periodBtn) {
          _activePeriod = periodBtn.dataset.period || 'monthly';
          setActivePeriodBtn(screen, _activePeriod);
          loadData(screen, _activePeriod);
          return;
        }

        var perfPeriodBtn = e.target.closest('.perf-period-btn');
        if (perfPeriodBtn) {
          _activePerfPeriod = perfPeriodBtn.dataset.perfPeriod || 'week';
          setActivePerfPeriodBtn(screen, _activePerfPeriod);
          loadPerfData(screen, _activePerfPeriod);
          return;
        }

        var perfCard = e.target.closest('[data-perf-uid]');
        if (perfCard) {
          APP.call('getUserPerformance', perfCard.dataset.perfUid, _activePerfPeriod, null, APP.token)
            .then(function(p) { renderUserPerfDetail(screen, p || {}); })
            .catch(function() {});
          return;
        }

        var closeBtn = e.target.closest('[data-action="perf-detail-close"]');
        if (closeBtn) {
          var box = screen.querySelector('[data-area="perf-detail"]');
          if (box) box.classList.add('hidden');
          return;
        }

        var actionBtn = e.target.closest('[data-action]');
        if (actionBtn && actionBtn.dataset.action === 'notifications') {
          APP.navigate('notifications');
        }
      };
      screen.addEventListener('click', screen._clickHandler);

      setActivePeriodBtn(screen, _activePeriod);
      loadData(screen, _activePeriod);
      setActivePerfPeriodBtn(screen, _activePerfPeriod);
      loadPerfData(screen, _activePerfPeriod);
    },
    unmount: function () {
      var screen = document.querySelector('[data-screen="reports-kpi"]');
      if (screen && screen._clickHandler) {
        screen.removeEventListener('click', screen._clickHandler);
        screen._clickHandler = null;
      }
    }
  });
}());
</script>
