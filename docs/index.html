<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<meta name="theme-color" content="#1A73E8"/>
<title>TaskFlow — Pack Masters</title>
<link rel="icon" type="image/png" href="data:image/png;base64,iVBORw0KGgo="/>
<style>
  :root { color-scheme: light; }
  html, body { margin: 0; padding: 0; height: 100vh; height: 100dvh; overflow: hidden; background: #fff; font-family: 'Inter', system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
  /* Wrapper crops the iframe's top sandbox banner (38–46px tall on desktop, 60px on mobile).
     The banner sits in the iframe document, NOT in this wrapper, so we negative-position the iframe
     and use overflow:hidden on the wrapper to clip it. */
  #wrap {
    position: fixed; inset: 0;
    overflow: hidden;
    background: #fff;
  }
  /* iframe height = viewport + banner-height; offset by -banner-height so banner sits
     outside the visible window. */
  #app {
    position: absolute;
    left: 0; right: 0;
    top: -42px;             /* desktop banner ~38–42px */
    width: 100%;
    height: calc(100% + 42px);
    border: 0;
    display: block;
  }
  @media (max-width: 640px) {
    #app { top: -60px; height: calc(100% + 60px); } /* mobile banner taller */
  }
  /* Splash while iframe loads — visual only, MUST NOT block taps to the iframe.
     Without pointer-events:none here, on slow networks the splash sits on top
     of the iframe for 1.2-8s blocking every login tap. */
  #splash {
    position: fixed; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 14px; background: #fff; z-index: 10;
    pointer-events: none;
    transition: opacity .4s ease-out;
  }
  #splash.hide { opacity: 0; }
  #splash .logo {
    width: 64px; height: 64px; border-radius: 50%;
    background: #E8F0FE; color: #1A73E8;
    display: flex; align-items: center; justify-content: center;
    font-size: 32px;
  }
  #splash h1 {
    font-size: 20px; font-weight: 700; color: #202124; margin: 0;
    letter-spacing: -0.01em;
  }
  #splash p { font-size: 13px; color: #5F6368; margin: 0; }
  .spinner {
    width: 24px; height: 24px;
    border: 2.5px solid #E8F0FE;
    border-top-color: #1A73E8;
    border-radius: 50%;
    /* Faster spin = perceived faster load (Emil's perceived-performance rule). */
    animation: spin .7s linear infinite;
    margin-top: 4px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="splash">
  <div class="logo">⚡</div>
  <h1>TaskFlow</h1>
  <p>Pack Masters · DWM</p>
  <div class="spinner" aria-label="Loading"></div>
</div>
<div id="wrap">
  <iframe
    id="app"
    src="https://script.google.com/macros/s/AKfycbxG3yKj-XzyU2ydckTNCe0Poc-en3sjDkHJzr-SQFLsEQXF3l4X8Zg49MF_7ZTU_bRHkw/exec"
    allow="clipboard-read; clipboard-write; geolocation; microphone; camera"
    referrerpolicy="no-referrer-when-downgrade"
    loading="eager"
    title="TaskFlow"
  ></iframe>
</div>
<script>
  // Hide splash as soon as iframe fires `load`. Previously held the splash for a
  // 1200ms "feel intentional" grace, which just made the app feel slower. Trust
  // the load event; on slow networks the hard 6s timeout still catches stalls.
  var splash = document.getElementById('splash');
  var iframe = document.getElementById('app');
  function hideSplash() {
    if (splash.classList.contains('hide')) return;
    splash.classList.add('hide');
    setTimeout(function() { splash.style.display = 'none'; }, 350);
  }
  iframe.addEventListener('load', hideSplash);
  // Hard timeout: hide splash after 6s even if iframe never fires load.
  setTimeout(hideSplash, 6000);

  // Service worker registration for offline shell (cache the wrapper itself)
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(function() { /* harmless if absent */ });
  }
</script>
</body>
</html>
