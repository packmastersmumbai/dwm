  <style>
    /* Base layout — screens are absolutely positioned, only one visible at a time */
    body { margin: 0; font-family: var(--font-sans); background: var(--color-canvas); overflow: hidden; }
    .tf-screen { display: none; position: fixed; inset: 0; overflow-y: auto; background: var(--color-canvas); }
    .tf-screen.active { display: flex; flex-direction: column; }
    .tf-screen.active > [data-screen] { display: flex; flex-direction: column; flex: 1 1 0%; min-height: 100%; }
    /* Toast styles */
    #tf-toast { position: fixed; bottom: var(--space-xl); left: 50%; transform: translateX(-50%);
      padding: 10px var(--space-lg); border-radius: var(--radius-sm); font-size: var(--fs-body-md); z-index: 9999;
      opacity: 0; transition: opacity 0.3s; pointer-events: none; }
    #tf-toast.show { opacity: 1; }
    #tf-toast.success { background: var(--color-status-ontime); color: var(--color-on-primary); }
    #tf-toast.error { background: var(--color-status-overdue); color: var(--color-ink); }
  </style>

  document.addEventListener('click', function (e) {
    var nav = e.target.closest && e.target.closest('[data-nav]');
    if (!nav) return;
    var slug = nav.getAttribute('data-nav');
    if (!slug) return;
    e.preventDefault();
    e.stopPropagation();
    navigate(slug);
  }, true);

  function navigate(slug, params) {
    params = params || {};
    if (_currentSlug && _screens[_currentSlug] && _screens[_currentSlug].unmount) {
      try { _screens[_currentSlug].unmount(); } catch(e) { console.warn('unmount error', e); }
    }
    if (_currentSlug) {
      var prev = document.getElementById('screen-' + _currentSlug);
      if (prev) prev.classList.remove('active');
    }
    var next = document.getElementById('screen-' + slug);
    if (!next) { console.error('No screen div for slug:', slug); return; }
    next.classList.add('active');
    _currentSlug = slug;
    _params = params;
    if (_screens[slug] && _screens[slug].mount) {
      try { _screens[slug].mount(params); } catch(e) { console.error('mount error', slug, e); showError('Failed to load screen: ' + slug); }
    }
    next.scrollTop = 0;
  }

  // Client-side response cache: avoids redundant google.script.run roundtrips
  // for read-only endpoints that rarely change. TTL applied per entry.
  // Mutations elsewhere call APP.invalidate(fnName).
  var _callCache = {};
  // fn → TTL ms. 0 or absent = no cache.
  var _cacheTtl = {
    'getClients':     5 * 60 * 1000,
    'getCategories':  5 * 60 * 1000,
    'getTeamMembers': 3 * 60 * 1000,
    'getUsersForLogin': 60 * 1000
  };
  // Map of mutation → cache keys to invalidate
  var _invalidateMap = {
    'createClient':   ['getClients'],
    'updateClient':   ['getClients'],
    'createCategory': ['getCategories'],
    'updateCategory': ['getCategories'],
    'createUser':     ['getTeamMembers', 'getUsersForLogin'],
    'updateUser':     ['getTeamMembers', 'getUsersForLogin'],
    'removeUser':     ['getTeamMembers', 'getUsersForLogin']
  };
  function _cacheKey(fnName, args) {
    return fnName + '::' + JSON.stringify(args);
  }
  function invalidate(fnName) {
    if (Array.isArray(fnName)) { fnName.forEach(invalidate); return; }
    // Wipe all entries that start with this fn name
    Object.keys(_callCache).forEach(function(k) {
      if (k.indexOf(fnName + '::') === 0) delete _callCache[k];
    });
  }
  function call(fnName) {
    var args = Array.prototype.slice.call(arguments, 1);
    var ttl = _cacheTtl[fnName] || 0;
    if (ttl > 0) {
      var key = _cacheKey(fnName, args);
      var cached = _callCache[key];
      if (cached && (Date.now() - cached.t) < ttl) {
        return Promise.resolve(cached.v);
      }
    }
    return new Promise(function(resolve, reject) {
      try {
        var runner = google.script.run
          .withSuccessHandler(function(result) {
            if (ttl > 0) _callCache[_cacheKey(fnName, args)] = { t: Date.now(), v: result };
            // Auto-invalidate on mutations
            if (_invalidateMap[fnName]) invalidate(_invalidateMap[fnName]);
            resolve(result);
          })
          .withFailureHandler(function(err) {
            var msg = (err && (err.message || String(err))) || '';
            if (msg.indexOf('Session expired') !== -1) {
              _token = null;
              currentUser = null;
              try { sessionStorage.removeItem('tf_token'); sessionStorage.removeItem('tf_user'); } catch(se) {}
              navigate('pin-login');
            }
            reject(err && err.message ? err : new Error(msg));
          });
        runner[fnName].apply(runner, args);
      } catch(e) {
        reject(new Error('APP.call failed [' + fnName + ']: ' + e.message));
      }
    });
  }

  var _toastTimer = null;
  function _toast(msg, type) {
    var el = document.getElementById('tf-toast');
    el.textContent = msg;
    el.className = 'show ' + type;
    if (_toastTimer) clearTimeout(_toastTimer);
    _toastTimer = setTimeout(function() { el.className = ''; }, 3000);
  }
  function showError(msg) { _toast(msg || 'Something went wrong', 'error'); }
  function showSuccess(msg) { _toast(msg || 'Done!', 'success'); }
  return {
    register: register,
    navigate: navigate,
    call: call,
    invalidate: invalidate,
    showError: showError,
    showSuccess: showSuccess,
    state: state,
    get currentUser() { return currentUser; },
    set currentUser(u) {
      currentUser = u;
      // Mirror the role onto <body data-role="..."> so the global Admin-tab
      // hide rule in shared-styles.html can act on it without per-screen JS.
      try {
        if (u && u.role) document.body.setAttribute('data-role', u.role);
        else document.body.removeAttribute('data-role');
      } catch(_) {}
    },
    get token() { return _token; },
    set token(t) { _token = t; },

    // === Global REC pill ==========================================
    // Per DESIGN.md: "Visible in the top-right of every screen via the
    // global app shell". Previously only per-card pills existed inside
    // kanban-home. The global pill makes a running timer visible from
    // any screen. Tapping it returns to kanban-home.
    //
    // setGlobalRec({ startedAt: ISO, count: N }) shows the pill.
    // clearGlobalRec() hides it.
    // The pill embeds a [data-live-timer] span so the shell ticker
    // (below) updates HH:MM:SS each second.
    setGlobalRec: function(opts) {
      var el = document.getElementById('tf-global-rec');
      if (!el) return;
      opts = opts || {};
      var start = opts.startedAt || '';
      var count = Number(opts.count) || 1;
      var countSuffix = count > 1 ? ('  +' + (count - 1)) : '';
      el.innerHTML =
        '<span class="tf-rec-dot"></span>' +
        '<span class="tf-rec-text">REC <span data-live-timer data-start="' +
          String(start).replace(/[<>&"]/g, '') + '">' + _formatElapsed(start) +
        '</span>' + countSuffix + '</span>';
      el.classList.remove('hidden');
      _ensureShellTicker();
    },
    clearGlobalRec: function() {
      var el = document.getElementById('tf-global-rec');
      if (!el) return;
      el.innerHTML = '';
      el.classList.add('hidden');
    }
  };

  // === Shell ticker ===============================================
  // Cheap 1-second interval that ticks ALL [data-live-timer] elements
  // currently in the DOM. Runs whenever any are present (global pill OR
  // per-card pills) and stops automatically when none remain.
  // This is what makes the global REC pill survive screen navigation —
  // it owns the tick, not kanban-home.
  var _shellTickerInterval = null;
  function _ensureShellTicker() {
    if (_shellTickerInterval) return;
    _shellTickerInterval = setInterval(function () {
      var live = document.querySelectorAll('[data-live-timer]');
      if (!live.length) {
        clearInterval(_shellTickerInterval);
        _shellTickerInterval = null;
        return;
      }
      live.forEach(function (el) {
        var s = el.getAttribute('data-start');
        if (s) el.textContent = _formatElapsed(s);
      });
    }, 1000);
  }
  function _formatElapsed(startIso) {
    if (!startIso) return '00:00';
    var ms = Date.now() - new Date(startIso).getTime();
    if (!isFinite(ms) || ms < 0) ms = 0;
    var total = Math.floor(ms / 1000);
    var h = Math.floor(total / 3600);
    var m = Math.floor((total % 3600) / 60);
    var s = total % 60;
    function p(n) { return n < 10 ? '0' + n : '' + n; }
    return h > 0 ? (h + ':' + p(m) + ':' + p(s)) : (p(m) + ':' + p(s));
  }

  // Tapping the global pill navigates back to kanban-home so the user
  // can see / stop the active timer.
  document.addEventListener('click', function (e) {
    var pill = e.target.closest && e.target.closest('#tf-global-rec');
    if (!pill) return;
    e.preventDefault();
    e.stopPropagation();
    if (window.APP && typeof APP.navigate === 'function') APP.navigate('kanban-home');
  }, true);
})();
</script>

<!-- Init: runs after all screen IIFEs have registered via APP.register() -->
<script>
document.addEventListener('DOMContentLoaded', function() {
  function _deepLinkTarget() {
    var t = window.TF_INITIAL && window.TF_INITIAL.taskId;
    return t ? { screen: 'task-detail-sheet', params: { taskId: t } } : null;
  }
  // Attempt to restore session from sessionStorage (survives accidental reload)
  try {
    var storedToken = sessionStorage.getItem('tf_token');
    var storedUser  = sessionStorage.getItem('tf_user');
    if (storedToken && storedUser) {
      APP.token = storedToken;
      APP.currentUser = JSON.parse(storedUser);
      var dl = _deepLinkTarget();
      if (dl) { APP.navigate('kanban-home'); setTimeout(function(){ APP.navigate(dl.screen, dl.params); }, 50); }
      else APP.navigate('kanban-home');
      return;
    }
  } catch(e) { /* ignore storage errors */ }
  APP.navigate('pin-login');
});
</script>
