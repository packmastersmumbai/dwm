/* === Signature typography & motion === */

  font-weight: 400;
  letter-spacing: -0.02em;
  line-height: 0.95;
}

  font-style: normal;
  font-family: var(--font-sans);
  font-size: 0.4em;
  vertical-align: super;
  margin-left: 0.05em;
  color: var(--color-primary);

/* Custom REC pill — tabular digits, breathing dot, faint glow.
   Apply via .tf-rec class on the wrapping span. */
.tf-rec {
  font-variant-numeric: tabular-nums;
  letter-spacing: var(--tracking-wide);
  color: var(--color-rec-active);
}
.tf-rec-dot {
  display: inline-block;
  width: 0.5em; height: 0.5em;
  border-radius: 50%;
  background: var(--color-rec-active);
  margin-right: 0.35em;
  vertical-align: middle;
  animation: tfRecBreath 1.1s ease-in-out infinite;
}
@keyframes tfRecBreath {
  0%, 100% { transform: scale(0.92); }
  50%      { transform: scale(1.08); }
}

/* === Global focus rings (a11y — was missing on most buttons) === */
button:focus-visible,
[role="button"]:focus-visible,
a:focus-visible,
input:focus-visible,
textarea:focus-visible,
select:focus-visible,
[tabindex]:focus-visible {
  outline: 2px solid var(--color-focus-ring);
  outline-offset: 2px;
  border-radius: inherit;
}
button:focus:not(:focus-visible) { outline: none; }

/* === Reduced motion — disable all animations system-wide === */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.001ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.001ms !important;
    scroll-behavior: auto !important;
  }
}

/* === AI-slop fix: neutralize the chunky 4px side-stripe accents on cards ===
   PRODUCT.md + impeccable shared laws disallow decorative side-stripes >1px
   as primary status indicators. Status meaning is preserved via tf-pri-chip,
   colored dots, bg tints, and icons that already exist in every card.
   Touch-target buttons (.tb-action-btn, w-9/h-9 icon buttons) keep their
   focus rings via the global rule above. */
[data-screen] article.border-l-4,
[data-screen] div.border-l-4 {
  border-left-width: 1px !important;
}

/* === A11y fix: enlarge sub-44px icon buttons (w-8/h-8 = 32px, w-9/h-9 = 36px)
   to meet WCAG 2.5.5 minimum 44x44. Only applies to <button> elements so we
   don't blow up decorative dots or avatars. === */

[data-screen] button.w-9.h-9 {
  min-width: 44px;
  min-height: 44px;
}

  display: inline-flex;
  align-items: center;
  gap: 0.25rem;
  font-size: 10px;
  font-weight: 700;
  line-height: 1;
  padding: 3px 6px;
  border-radius: 4px;
  letter-spacing: 0.04em;
