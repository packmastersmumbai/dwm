<div data-screen="kanban-home">
<style>
  @media (prefers-reduced-motion: reduce) {
    .animate-pulse, .animate-ping { animation: none !important; }
  }
</style>

<!-- TopAppBar -->
<header class="docked full-width top-0 h-nav-height border-b border-outline-variant shadow-sm flex justify-between items-center px-margin-edge w-full h-nav-height z-50 bg-surface text-primary">
  <div class="flex items-center gap-3">
    <div id="kh-header-avatar" class="w-8 h-8 rounded-full border border-outline-variant cursor-pointer bg-secondary-container flex items-center justify-center text-[11px] font-bold text-on-secondary-container overflow-hidden shrink-0"></div>
    <h1 class="font-title-main-mobile text-title-main-mobile font-bold text-primary">My Board</h1>
  </div>
  <div class="flex items-center gap-4">
    <button class="w-10 h-10 flex items-center justify-center rounded-full text-on-surface-variant hover:bg-surface-container transition-colors cursor-pointer focus-visible:ring-2 ring-primary" aria-label="Search" data-action="search">
      <span class="material-symbols-outlined">search</span>
    </button>
    <button class="w-10 h-10 flex items-center justify-center rounded-full text-on-surface-variant hover:bg-surface-container transition-colors cursor-pointer focus-visible:ring-2 ring-primary relative" data-action="notifications" aria-label="Notifications">
      <span class="material-symbols-outlined">notifications</span>
      <span class="absolute top-1.5 right-1.5 w-2 h-2 rounded-full bg-[#DC2626]"></span>
    </button>
  </div>
</header>

<!-- Search Overlay -->
<div id="kh-search-overlay" class="absolute inset-0 bg-surface z-[60] flex flex-col" style="display:none">
  <div class="flex items-center gap-2 px-3 py-2 border-b border-outline-variant bg-surface shrink-0">
    <button id="kh-search-close" class="w-10 h-10 flex items-center justify-center rounded-full text-on-surface-variant hover:bg-surface-container" aria-label="Close search">
      <span class="material-symbols-outlined">arrow_back</span>
    </button>
    <input id="kh-search-input" type="search" placeholder="Search tasks, clients…"
      class="flex-1 h-10 bg-surface-container rounded-full px-4 text-sm text-on-surface outline-none border border-outline-variant focus:border-primary transition-colors"/>
  </div>
  <div id="kh-search-results" class="flex-1 overflow-y-auto px-margin-edge py-3 flex flex-col gap-2">
    <p class="text-on-surface-variant text-sm text-center mt-8">Type to search tasks…</p>
  </div>
</div>

<!-- View Mode Tabs -->
<div class="w-full px-margin-edge pt-2 pb-1 flex gap-1 shrink-0 bg-surface" data-view-tabs>
  <button class="view-tab flex-1 py-2 rounded-lg bg-secondary-container text-on-secondary-container font-label-bold text-label-bold cursor-pointer transition-colors focus-visible:ring-2 ring-primary flex items-center justify-center gap-1" data-view="board"><span class="material-symbols-outlined text-[16px]">view_kanban</span>Board</button>
  <button class="view-tab flex-1 py-2 rounded-lg text-on-surface-variant hover:bg-surface-container-low font-label-bold text-label-bold cursor-pointer transition-colors focus-visible:ring-2 ring-primary flex items-center justify-center gap-1" data-view="list"><span class="material-symbols-outlined text-[16px]">view_list</span>List</button>
  <button class="view-tab flex-1 py-2 rounded-lg text-on-surface-variant hover:bg-surface-container-low font-label-bold text-label-bold cursor-pointer transition-colors focus-visible:ring-2 ring-primary flex items-center justify-center gap-1" data-view="timeline"><span class="material-symbols-outlined text-[16px]">schedule</span>Timeline</button>
</div>

<!-- Scope Toggle -->
<div class="w-full overflow-x-auto hide-scrollbar py-2 px-margin-edge flex gap-2 shrink-0 bg-surface" data-scope-row>
  <button class="scope-btn px-3 py-1 rounded-full bg-primary-container text-on-primary-container font-label-bold text-label-bold whitespace-nowrap cursor-pointer transition-colors focus-visible:ring-2 ring-primary" data-scope="mine">Mine</button>
  <button class="scope-btn px-3 py-1 rounded-full border border-outline text-on-surface-variant font-label-bold text-label-bold whitespace-nowrap cursor-pointer transition-colors focus-visible:ring-2 ring-primary" data-scope="team">Team</button>
  <button class="scope-btn px-3 py-1 rounded-full border border-outline text-on-surface-variant font-label-bold text-label-bold whitespace-nowrap cursor-pointer transition-colors focus-visible:ring-2 ring-primary" data-scope="shared">Shared</button>
</div>

<!-- Filter Row -->
<div class="w-full overflow-x-auto hide-scrollbar py-3 px-margin-edge flex gap-2 shrink-0 border-b border-outline-variant bg-surface" data-filter-row>
  <button class="filter-btn px-4 py-1.5 rounded-full border border-outline text-on-surface-variant font-label-bold text-label-bold whitespace-nowrap cursor-pointer transition-colors focus-visible:ring-2 ring-primary" data-filter="today">Today</button>
  <button class="filter-btn px-4 py-1.5 rounded-full border border-outline text-on-surface-variant font-label-bold text-label-bold whitespace-nowrap cursor-pointer transition-colors focus-visible:ring-2 ring-primary" data-filter="week">This Week</button>
  <button class="filter-btn px-4 py-1.5 rounded-full bg-primary-container text-on-primary-container font-label-bold text-label-bold whitespace-nowrap cursor-pointer transition-colors focus-visible:ring-2 ring-primary" data-filter="all">All</button>
  <button class="filter-btn px-4 py-1.5 rounded-full border border-outline text-on-surface-variant font-label-bold text-label-bold whitespace-nowrap flex items-center gap-1 cursor-pointer transition-colors focus-visible:ring-2 ring-primary" data-filter="overdue">
    Overdue <span class="bg-error text-on-error px-1.5 py-0.5 rounded-full text-[10px] leading-none hidden" data-overdue-count></span>
  </button>
</div>

<!-- Main Kanban Area (Board view) -->
<main data-view-area="board" class="flex-1 overflow-x-auto overflow-y-hidden kanban-snap flex gap-4 px-margin-edge py-4 pb-24">

  <!-- Column: To Do -->
  <section class="kanban-col shrink-0 w-[280px] h-full flex flex-col bg-col-todo rounded-lg overflow-hidden" data-col-status="todo">
    <div class="sticky top-0 bg-surface-container-low/90 backdrop-blur px-3 py-2 border-b border-outline-variant flex justify-between items-center">
      <div class="flex items-center gap-2">
        <span class="material-symbols-outlined text-[16px] text-[#6B7280]">pending</span>
        <h2 class="text-[13px] font-semibold text-on-surface">To Do</h2>
        <span class="bg-surface-variant text-on-surface-variant px-2 py-0.5 rounded-full text-xs" data-col-count="todo">0</span>
      </div>
      <button class="w-11 h-11 flex items-center justify-center rounded-full text-on-surface-variant hover:bg-surface-container transition-colors cursor-pointer focus-visible:ring-2 ring-primary" data-action="add-task-col" data-status="todo" aria-label="Add task to To Do">
        <span class="material-symbols-outlined text-[18px]">add</span>
      </button>
    </div>
    <div class="p-2 overflow-y-auto hide-scrollbar flex flex-col gap-3" data-area="task-list-todo"></div>
  </section>

  <!-- Column: In Progress -->
  <section class="kanban-col shrink-0 w-[280px] h-full flex flex-col bg-col-progress rounded-lg overflow-hidden" data-col-status="in-progress">
    <div class="sticky top-0 bg-surface-container-low/90 backdrop-blur px-3 py-2 border-b border-outline-variant flex justify-between items-center">
      <div class="flex items-center gap-2">
        <span class="material-symbols-outlined text-[16px] text-[#4F46E5]">model_training</span>
        <h2 class="text-[13px] font-semibold text-on-surface">In Progress</h2>
        <span class="bg-surface-variant text-on-surface-variant px-2 py-0.5 rounded-full text-xs" data-col-count="in-progress">0</span>
      </div>
      <button class="w-11 h-11 flex items-center justify-center rounded-full text-on-surface-variant hover:bg-surface-container transition-colors cursor-pointer focus-visible:ring-2 ring-primary" data-action="add-task-col" data-status="in-progress" aria-label="Add task to In Progress">
        <span class="material-symbols-outlined text-[18px]">add</span>
      </button>
    </div>
    <div class="p-2 overflow-y-auto hide-scrollbar flex flex-col gap-3" data-area="task-list-inprogress"></div>
  </section>

  <!-- Column: Done -->
  <section class="kanban-col shrink-0 w-[280px] h-full flex flex-col bg-col-done rounded-lg overflow-hidden" data-col-status="done">
    <div class="sticky top-0 bg-surface-container-low/90 backdrop-blur px-3 py-2 border-b border-outline-variant flex justify-between items-center">
      <div class="flex items-center gap-2">
        <span class="material-symbols-outlined text-[16px] text-[#10B981]">check_circle</span>
        <h2 class="text-[13px] font-semibold text-on-surface">Done</h2>
        <span class="bg-surface-variant text-on-surface-variant px-2 py-0.5 rounded-full text-xs" data-col-count="done">0</span>
      </div>
    </div>
    <div class="p-2 overflow-y-auto hide-scrollbar flex flex-col gap-3" data-area="task-list-done"></div>
  </section>

</main>

<!-- List view -->
<main data-view-area="list" class="flex-1 overflow-y-auto px-margin-edge py-3 pb-24 flex flex-col gap-2" style="display:none"></main>

<!-- Timeline view -->
<main data-view-area="timeline" class="flex-1 overflow-y-auto px-margin-edge py-3 pb-24 flex flex-col gap-4" style="display:none"></main>

<!-- FAB -->
<button class="fixed bottom-[80px] right-margin-edge w-fab-size h-fab-size bg-[#4F46E5] rounded-full flex items-center justify-center text-white z-40 cursor-pointer hover:bg-primary active:scale-90 transition-all duration-200 focus-visible:ring-2 ring-offset-2 ring-primary" style="box-shadow:0 4px 12px rgba(26,115,232,0.35)" data-action="add-task" aria-label="Add task">
  <span class="material-symbols-outlined text-[24px]">add</span>
</button>

<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full h-nav-height z-50 border-t border-outline-variant shadow-lg flex justify-around items-center px-2 bg-surface">
  <button class="flex flex-col items-center justify-center bg-secondary-container text-on-secondary-container rounded-2xl px-4 py-1 cursor-pointer active:scale-90 transition-all duration-200 focus-visible:ring-2 ring-primary" data-nav="kanban-home">
    <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">home</span>
    <span class="font-label-bold text-label-bold mt-0.5">Home</span>
  </button>
  <button class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-1 cursor-pointer hover:bg-surface-container-low active:scale-90 transition-all duration-200 rounded-xl focus-visible:ring-2 ring-primary" data-nav="notifications">
    <span class="material-symbols-outlined">notifications</span>
    <span class="font-label-bold text-label-bold mt-0.5">Inbox</span>
  </button>
  <button class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-1 cursor-pointer hover:bg-surface-container-low active:scale-90 transition-all duration-200 rounded-xl focus-visible:ring-2 ring-primary" data-nav="quick-capture">
    <span class="material-symbols-outlined">add_box</span>
    <span class="font-label-bold text-label-bold mt-0.5">Quick</span>
  </button>
  <button class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-1 cursor-pointer hover:bg-surface-container-low active:scale-90 transition-all duration-200 rounded-xl focus-visible:ring-2 ring-primary" data-nav="admin-panel">
    <span class="material-symbols-outlined">settings</span>
    <span class="font-label-bold text-label-bold mt-0.5">Admin</span>
  </button>
  <button class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-1 cursor-pointer hover:bg-surface-container-low active:scale-90 transition-all duration-200 rounded-xl focus-visible:ring-2 ring-primary" data-nav="reports-kpi">
    <span class="material-symbols-outlined">bar_chart</span>
    <span class="font-label-bold text-label-bold mt-0.5">Reports</span>
  </button>
</nav>
</div>

<script>
(function () {
  var _timerInterval = null;
  var _timerTickCount = 0; // counts ticks for 60-second heartbeat
  var _allTasks = [];
  var _activeFilter = (function(){ try { return sessionStorage.getItem('kh.filter') || 'all'; } catch(e){ return 'all'; } })();
  var _activeScope = (function(){ try { return sessionStorage.getItem('kh.scope') || 'mine'; } catch(e){ return 'mine'; } })();
  var _activeView  = (function(){ try { return sessionStorage.getItem('kh.view')  || 'board'; } catch(e){ return 'board'; } })();
  // Multi-timer state: map of taskId → { logId, startedAt }
  // Supports any number of concurrent running timers per user.
  var _activeTimers = {};

  // ── helpers ──────────────────────────────────────────────────────────────

  function priorityBorderClass(p) {
    if (p === 'urgent' || p === 'high') return 'border-error';
    if (p === 'medium') return 'border-[#4F46E5]';
    if (p === 'low') return 'border-[#10B981]';
    return 'border-outline-variant';
  }
  function priorityDotColor(p) {
    if (p === 'urgent') return '#DC2626';
    if (p === 'high') return '#FF6D00';
    if (p === 'medium') return '#4F46E5';
    if (p === 'low') return '#10B981';
    return '#D3CFC7';
  }
  function presenceDotColor(status) {
    return status === 'online' ? '#10B981' : status === 'away' ? '#4F46E5' : '#D3CFC7';
  }

  function formatElapsed(startIso) {
    var secs = Math.floor((Date.now() - new Date(startIso).getTime()) / 1000);
    var h = Math.floor(secs / 3600);
    var m = Math.floor((secs % 3600) / 60);
    var s = secs % 60;
    return [h, m, s].map(function (v) { return String(v).padStart(2, '0'); }).join(':');
  }

  function renderCard(task) {
    var session = _activeTimers[task.id] || null;
    var isTimer = !!session;
    var timerStart = session ? session.startedAt : null;
    var borderClass = priorityBorderClass(task.priority);
    var _assignee0 = (task.assignees && task.assignees[0]) || {};
    var _assigneeName = _assignee0.name || task.assignee || '?';
    var _assigneeAvatar = _assignee0.avatar || task.assigneeAvatar || null;
    var _assigneeStatus = _assignee0.status || 'offline';
    var initials = _assigneeName.split(' ').map(function (w) { return w[0]; }).join('').toUpperCase().slice(0, 2) || '?';
    // Overdue = strictly BEFORE today (date-only comparison; ignores time-of-day).
    // A task due today is NOT overdue.
    var _today = new Date(); _today.setHours(0,0,0,0);
    var _due = task.dueDate ? new Date(task.dueDate) : null;
    if (_due) _due.setHours(0,0,0,0);
    var isOverdue = !!_due && _due.getTime() < _today.getTime() && task.status !== 'done';

    // Checklist count — defensively parse if stored as JSON string
    var checklist = task.checklist;
    if (typeof checklist === 'string') { try { checklist = JSON.parse(checklist); } catch(e) { checklist = []; } }
    if (!Array.isArray(checklist)) checklist = [];
    var checklistDone = checklist.filter(function(c) { return c.done; }).length;
    var checklistHtml = checklist.length > 0
      ? '<span class="flex items-center gap-0.5 bg-surface-container px-1.5 py-0.5 rounded text-[10px]">' + checklistDone + '/' + checklist.length + ' ✓</span>'
      : '';

    // Due date with overdue styling
    var dueDateHtml = task.dueDate
      ? '<span class="flex items-center gap-0.5' + (isOverdue ? ' text-[#DC2626] font-semibold' : '') + '"><span class="material-symbols-outlined text-[12px]">calendar_today</span> ' + escHtml(task.dueDate) + '</span>'
      : '';

    // Task-type icon (design_services / code / etc.) per reference
    var typeIconMap = { design: 'design_services', dev: 'code', design_services: 'design_services', code: 'code', mktg: 'campaign', comms: 'forum' };
    var taskType = (task.category && task.category.name ? task.category.name : task.type) || '';
    var typeKey = taskType.toLowerCase().split(' ')[0];
    var typeIcon = typeIconMap[typeKey] ? '<span class="material-symbols-outlined text-[14px] text-on-surface-variant">' + typeIconMap[typeKey] + '</span>' : '';
    // task.client is an object {id, name, color, ...} after expandTask
    var clientName = (task.client && task.client.name) ? task.client.name : (typeof task.client === 'string' ? task.client : '');
    var clientChip = clientName ? '<span class="px-2 py-0.5 bg-surface-variant rounded-md font-normal">' + escHtml(clientName) + '</span>' : '';

    var timerHtml = isTimer
      ? '<div class="flex flex-wrap items-center gap-1.5 text-[11px] text-[#DC2626] font-bold mt-1"><span class="animate-pulse" data-live-timer data-start="' + escHtml(timerStart || '') + '">● REC ' + formatElapsed(timerStart) + '</span>' +
          (clientName ? '<span class="ml-auto px-2 py-0.5 bg-surface-variant text-on-surface-variant rounded-md font-normal">' + escHtml(clientName) + '</span>' : '') +
        '</div>'
      : '<div class="flex flex-wrap items-center gap-1.5 text-[11px] text-on-surface-variant mt-1">' +
          clientChip + typeIcon + dueDateHtml + checklistHtml + accumulatedChip(task) +
        '</div>';

    // Action buttons keyed by STATUS (not just live timer presence):
    //  - timer running        → Stop + Mark Done
    //  - in-progress, no timer→ Resume + Mark Done
    //  - todo                 → Start
    //  - done                 → (handled by separate done renderer)
    var btnStop  = '<button class="w-7 h-7 rounded-full bg-[#DC2626] text-white flex items-center justify-center cursor-pointer hover:brightness-90 transition-all focus-visible:ring-2 ring-[#DC2626] ring-offset-1" data-action="stop-timer" data-task-id="' + task.id + '" aria-label="Stop timer"><span class="material-symbols-outlined fill-icon" style="font-size:14px;">stop</span></button>';
    var btnDone  = '<button class="w-7 h-7 rounded-full bg-[#10B981] text-white flex items-center justify-center cursor-pointer hover:brightness-90 transition-all focus-visible:ring-2 ring-[#10B981] ring-offset-1" data-action="mark-done" data-task-id="' + task.id + '" aria-label="Mark complete"><span class="material-symbols-outlined fill-icon" style="font-size:14px;">check</span></button>';
    var btnStart = '<button class="w-7 h-7 rounded-full bg-[#4F46E5] text-white flex items-center justify-center cursor-pointer hover:brightness-90 transition-all focus-visible:ring-2 ring-[#4F46E5] ring-offset-1" data-action="start-timer" data-task-id="' + task.id + '" aria-label="Start timer"><span class="material-symbols-outlined fill-icon" style="font-size:14px;">play_arrow</span></button>';

    var playStop;
    if (isTimer) {
      playStop = '<div class="flex flex-col items-center gap-1.5 shrink-0 mt-auto">' + btnStop + btnDone + '</div>';
    } else if (task.status === 'in-progress') {
      playStop = '<div class="flex flex-col items-center gap-1.5 shrink-0 mt-auto">' + btnStart + btnDone + '</div>';
    } else {
      playStop = '<div class="shrink-0 mt-auto">' + btnStart + '</div>';
    }

    var activeClass = isTimer
      ? ' border border-[#DC2626] shadow-md'
      : ' hover:shadow-md';

    // Assignee with presence dot (image when available, initials fallback)
    var assigneeInner = _assigneeAvatar
      ? '<img alt="' + escHtml(_assigneeName) + '" class="w-full h-full object-cover rounded-full" src="' + escHtml(_assigneeAvatar) + '"/>'
      : '<div class="w-full h-full flex items-center justify-center text-[9px] font-bold bg-surface-variant text-on-surface-variant rounded-full">' + initials + '</div>';
    var presenceDotStyle = 'background:' + presenceDotColor(_assigneeStatus);
    var assigneePulse = isTimer ? ' animate-pulse' : '';
    var assigneeHtml = '<div class="relative w-[20px] h-[20px] shrink-0">' +
      assigneeInner +
      '<span class="absolute -bottom-0.5 -right-0.5 w-[8px] h-[8px] rounded-full border border-surface' + assigneePulse + '" style="' + presenceDotStyle + '"></span>' +
    '</div>';

    return '<article class="bg-white rounded-xl shadow-sm border-l-4 ' + borderClass + ' p-3 relative flex gap-2 cursor-pointer transition-shadow duration-200' + activeClass + '" data-task-id="' + task.id + '" data-action="open-task">' +
      '<div class="flex-1 flex flex-col justify-between min-w-0">' +
        '<div class="flex justify-between items-start mb-2 gap-2">' +
          '<h3 class="font-body-standard text-[14px] font-semibold leading-tight truncate text-on-surface">' + escHtml(task.title) + '</h3>' +
          assigneeHtml +
        '</div>' +
        timerHtml +
      '</div>' +
      playStop +
    '</article>';
  }

  function escHtml(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function formatMinutes(mins) {
    var m = Math.max(0, Math.floor(Number(mins) || 0));
    if (m < 60) return m + 'm';
    var h = Math.floor(m / 60);
    var rem = m % 60;
    return rem === 0 ? (h + 'h') : (h + 'h ' + rem + 'm');
  }

  function accumulatedChip(task) {
    if (task.status !== 'in-progress') return '';
    if (_activeTimers[task.id]) return ''; // live REC handles display
    var mins = Number(task.totalLoggedMinutes) || 0;
    return '<span class="tf-mono-meta flex items-center gap-0.5 text-[11px] text-on-surface-variant"><span class="material-symbols-outlined text-[12px]">timer</span>' + formatMinutes(mins) + '</span>';
  }

  function applyFilter(tasks, filter) {
    var today = new Date().toDateString();
    if (filter === 'today') {
      return tasks.filter(function (t) {
        if (!t.dueDate) return true;
        return new Date(t.dueDate).toDateString() === today;
      });
    }
    if (filter === 'week') {
      var weekAhead = new Date(); weekAhead.setDate(weekAhead.getDate() + 7);
      return tasks.filter(function (t) {
        if (!t.dueDate) return true;
        return new Date(t.dueDate) <= weekAhead;
      });
    }
    if (filter === 'overdue') {
      return tasks.filter(function (t) { return t.dueDate && (function(){var d=new Date();d.setHours(0,0,0,0);var dd=new Date(t.dueDate);dd.setHours(0,0,0,0);return dd.getTime() < d.getTime();})() && t.status !== 'done'; });
    }
    return tasks; // 'all'
  }

  function renderTasks(screen, tasks) {
    var statuses = { 'todo': 'task-list-todo', 'in-progress': 'task-list-inprogress', 'done': 'task-list-done' };
    var counts = { 'todo': 0, 'in-progress': 0, 'done': 0 };

    Object.keys(statuses).forEach(function (status) {
      var area = screen.querySelector('[data-area="' + statuses[status] + '"]');
      if (!area) return;
      var col = tasks.filter(function (t) { return t.status === status; });
      counts[status] = col.length;
      if (status === 'done') {
        // Sort most-recently-completed first; show accumulated time + done by + done date
        var sorted = col.slice().sort(function (a, b) {
          var ad = new Date(a.completedAt || a.updatedAt || a.dueDate || 0).getTime();
          var bd = new Date(b.completedAt || b.updatedAt || b.dueDate || 0).getTime();
          return bd - ad;
        });
        area.innerHTML = sorted.map(function (t) {
          var doneBy = (t.completedBy && t.completedBy.name) || t.completedByName ||
                       (t.assignees && t.assignees[0] && t.assignees[0].name) ||
                       (typeof t.assignee === 'string' ? t.assignee : (t.assignee && t.assignee.name) || '');
          var doneInitial = doneBy ? doneBy.charAt(0).toUpperCase() : '·';
          var doneDate = t.completedAt || t.updatedAt || '';
          var doneDateStr = doneDate ? new Date(doneDate).toISOString().slice(0,10) : '';
          var mins = Number(t.totalLoggedMinutes) || 0;
          var timeChip = mins > 0 ? '<span class="tf-mono-meta flex items-center gap-0.5 text-[11px] text-on-surface-variant"><span class="material-symbols-outlined text-[12px]">timer</span>' + formatMinutes(mins) + '</span>' : '';
          var doneChip = doneDateStr ? '<span class="tf-mono-meta flex items-center gap-0.5 text-[11px] text-on-surface-variant"><span class="material-symbols-outlined text-[12px]">check_circle</span>' + escHtml(doneDateStr) + '</span>' : '';
          var byChip = doneBy ? '<span class="flex items-center gap-1 text-[11px] text-on-surface-variant"><span class="w-4 h-4 rounded-full bg-surface-container flex items-center justify-center text-[9px] font-bold text-on-surface-variant">' + doneInitial + '</span>' + escHtml(doneBy) + '</span>' : '';
          return '<article class="bg-white rounded-xl shadow-sm p-3 cursor-pointer hover:shadow-md transition-shadow" data-task-id="' + t.id + '" data-action="open-task">' +
            '<h3 class="font-body-standard text-[13px] font-medium leading-tight line-through text-on-surface-variant">' + escHtml(t.title) + '</h3>' +
            '<div class="flex flex-wrap items-center gap-x-3 gap-y-1 mt-1.5">' + timeChip + doneChip + byChip + '</div>' +
          '</article>';
        }).join('') + (col.length > 6 ? '<div class="text-center mt-4 mb-2"><a class="text-[12px] text-primary hover:underline cursor-pointer" data-action="archive-done">Archive older tasks</a></div>' : '');
      } else {
        area.innerHTML = col.map(function (t) {
          return renderCard(t);
        }).join('');
      }
      var countEl = screen.querySelector('[data-col-count="' + status + '"]');
      if (countEl) countEl.textContent = col.length;
    });

    // overdue badge — computed from ALL loaded tasks (not the filtered subset)
    var overdueCount = _allTasks.filter(function (t) {
      var s = t.status;
      return t.dueDate && (function(){var d=new Date();d.setHours(0,0,0,0);var dd=new Date(t.dueDate);dd.setHours(0,0,0,0);return dd.getTime() < d.getTime();})() &&
             s !== 'done' && s !== 'deleted' && s !== 'archived';
    }).length;
    var badge = screen.querySelector('[data-overdue-count]');
    if (badge) {
      badge.textContent = overdueCount;
      if (overdueCount > 0) badge.classList.remove('hidden');
      else badge.classList.add('hidden');
    }
  }

  // ── List / Timeline row renderer (shared) ─────────────────────────────────

  function renderTaskRow(task) {
    var session = _activeTimers[task.id] || null;
    var isTimer = !!session;
    var clientName = (task.client && task.client.name) ? task.client.name : (typeof task.client === 'string' ? task.client : '');
    var _assignee0 = (task.assignees && task.assignees[0]) || {};
    var _assigneeName = _assignee0.name || task.assignee || '?';
    var initials = _assigneeName.split(' ').map(function (w) { return w[0]; }).join('').toUpperCase().slice(0, 2) || '?';
    var statusColor = task.status === 'done' ? '#10B981' : task.status === 'in-progress' ? '#4F46E5' : '#9CA3AF';
    var _today = new Date(); _today.setHours(0,0,0,0);
    var _due = task.dueDate ? new Date(task.dueDate) : null;
    if (_due) _due.setHours(0,0,0,0);
    var isOverdue = !!_due && _due.getTime() < _today.getTime() && task.status !== 'done';
    var dueTxt = task.dueDate ? escHtml(task.dueDate) : '—';

    var rightBtn;
    if (isTimer) {
      rightBtn = '<button class="w-7 h-7 rounded-full bg-[#DC2626] text-white flex items-center justify-center shrink-0 focus-visible:ring-2 ring-[#DC2626] ring-offset-1" data-action="stop-timer" data-task-id="' + task.id + '" aria-label="Stop timer"><span class="material-symbols-outlined fill-icon" style="font-size:14px;">stop</span></button>';
    } else if (task.status === 'in-progress') {
      rightBtn = '<button class="w-7 h-7 rounded-full bg-[#4F46E5] text-white flex items-center justify-center shrink-0 focus-visible:ring-2 ring-primary ring-offset-1" data-action="start-timer" data-task-id="' + task.id + '" aria-label="Resume timer"><span class="material-symbols-outlined fill-icon" style="font-size:14px;">play_arrow</span></button>';
    } else if (task.status === 'todo') {
      rightBtn = '<button class="w-7 h-7 rounded-full bg-[#4F46E5] text-white flex items-center justify-center shrink-0 focus-visible:ring-2 ring-primary ring-offset-1" data-action="start-timer" data-task-id="' + task.id + '" aria-label="Start timer"><span class="material-symbols-outlined fill-icon" style="font-size:14px;">play_arrow</span></button>';
    } else {
      rightBtn = '<span class="material-symbols-outlined text-[20px] text-[#10B981]">check_circle</span>';
    }

    var liveTime = isTimer
      ? '<span class="text-[11px] text-[#DC2626] font-bold animate-pulse" data-live-timer data-start="' + escHtml(session.startedAt || '') + '">● ' + formatElapsed(session.startedAt) + '</span>'
      : '';
    var accTime = (!isTimer && task.status === 'in-progress')
      ? '<span class="text-[11px] text-on-surface-variant">⏱ ' + formatMinutes(task.totalLoggedMinutes) + '</span>'
      : '';

    return '<div class="flex items-center gap-3 p-3 rounded-xl bg-surface border border-outline-variant cursor-pointer hover:bg-surface-container-low transition-colors" data-action="open-task" data-task-id="' + task.id + '">' +
      '<div class="w-2.5 h-2.5 rounded-full shrink-0" style="background:' + statusColor + '"></div>' +
      '<div class="flex-1 min-w-0">' +
        '<div class="flex items-center gap-2">' +
          '<p class="text-sm font-semibold text-on-surface truncate">' + escHtml(task.title) + '</p>' +
        '</div>' +
        '<div class="flex items-center gap-2 text-[11px] text-on-surface-variant mt-0.5 flex-wrap">' +
          (clientName ? '<span class="truncate">' + escHtml(clientName) + '</span>' : '') +
          '<span class="' + (isOverdue ? 'text-[#DC2626] font-semibold' : '') + '">' + dueTxt + '</span>' +
          liveTime + accTime +
        '</div>' +
      '</div>' +
      '<div class="w-[20px] h-[20px] rounded-full bg-surface-variant text-on-surface-variant text-[9px] font-bold flex items-center justify-center shrink-0">' + initials + '</div>' +
      rightBtn +
    '</div>';
  }

  function renderList(screen, tasks) {
    var area = screen.querySelector('[data-view-area="list"]');
    if (!area) return;
    var sorted = tasks.slice().sort(function(a, b) {
      var ad = a.dueDate || '9999-99-99';
      var bd = b.dueDate || '9999-99-99';
      return ad < bd ? -1 : ad > bd ? 1 : 0;
    });
    if (sorted.length === 0) {
      area.innerHTML = '<p class="text-center text-on-surface-variant text-sm mt-8">No tasks</p>';
      return;
    }
    area.innerHTML = sorted.map(renderTaskRow).join('');
  }

  function renderTimeline(screen, tasks) {
    var area = screen.querySelector('[data-view-area="timeline"]');
    if (!area) return;
    var today = new Date(); today.setHours(0,0,0,0);
    var tomorrow = new Date(today); tomorrow.setDate(today.getDate() + 1);
    var endOfWeek = new Date(today); endOfWeek.setDate(today.getDate() + 7);
    var groups = { 'Today': [], 'Tomorrow': [], 'This Week': [], 'Later': [], 'No Date': [] };
    tasks.forEach(function (t) {
      if (!t.dueDate) { groups['No Date'].push(t); return; }
      var d = new Date(t.dueDate); d.setHours(0,0,0,0);
      if (d.getTime() === today.getTime()) groups['Today'].push(t);
      else if (d.getTime() === tomorrow.getTime()) groups['Tomorrow'].push(t);
      else if (d.getTime() > today.getTime() && d.getTime() <= endOfWeek.getTime()) groups['This Week'].push(t);
      else groups['Later'].push(t);
    });
    var order = ['Today', 'Tomorrow', 'This Week', 'Later', 'No Date'];
    var html = '';
    order.forEach(function (name) {
      var arr = groups[name];
      if (!arr.length) return;
      arr.sort(function(a,b){ var ad=a.dueDate||'9999'; var bd=b.dueDate||'9999'; return ad<bd?-1:ad>bd?1:0; });
      html += '<section><h3 class="text-[12px] font-bold uppercase tracking-wide text-on-surface-variant mb-2 px-1">' + name + ' <span class="text-on-surface-variant font-normal">(' + arr.length + ')</span></h3>' +
        '<div class="flex flex-col gap-2">' + arr.map(renderTaskRow).join('') + '</div></section>';
    });
    if (!html) html = '<p class="text-center text-on-surface-variant text-sm mt-8">No tasks</p>';
    area.innerHTML = html;
  }

  function renderAll(screen) {
    var filtered = applyFilter(_allTasks, _activeFilter);
    if (_activeView === 'board') renderTasks(screen, filtered);
    else if (_activeView === 'list') renderList(screen, filtered);
    else if (_activeView === 'timeline') renderTimeline(screen, filtered);
    // Always keep overdue badge correct (it reads from _allTasks)
    var overdueCount = _allTasks.filter(function (t) {
      var s = t.status;
      return t.dueDate && (function(){var d=new Date();d.setHours(0,0,0,0);var dd=new Date(t.dueDate);dd.setHours(0,0,0,0);return dd.getTime() < d.getTime();})() &&
             s !== 'done' && s !== 'deleted' && s !== 'archived';
    }).length;
    var badge = screen.querySelector('[data-overdue-count]');
    if (badge) {
      badge.textContent = overdueCount;
      if (overdueCount > 0) badge.classList.remove('hidden');
      else badge.classList.add('hidden');
    }
  }

  function applyViewVisibility(screen) {
    ['board','list','timeline'].forEach(function (v) {
      var el = screen.querySelector('[data-view-area="' + v + '"]');
      if (!el) return;
      if (v === _activeView) el.style.removeProperty('display');
      else el.style.display = 'none';
    });
    screen.querySelectorAll('.view-tab').forEach(function (b) {
      var on = b.dataset.view === _activeView;
      b.classList.toggle('bg-secondary-container', on);
      b.classList.toggle('text-on-secondary-container', on);
      b.classList.toggle('text-on-surface-variant', !on);
    });
  }

  function applyScopeVisibility(screen) {
    screen.querySelectorAll('.scope-btn').forEach(function (b) {
      var on = b.dataset.scope === _activeScope;
      b.classList.toggle('bg-primary-container', on);
      b.classList.toggle('text-on-primary-container', on);
      b.classList.toggle('border', !on);
      b.classList.toggle('border-outline', !on);
      b.classList.toggle('text-on-surface-variant', !on);
    });
  }

  // Single interval ticks ALL active per-card timer pills.
  // Each `[data-live-timer]` carries its own `data-start` ISO timestamp.
  function ensureTickerRunning() {
    if (_timerInterval) return;
    _timerTickCount = 0;
    _timerInterval = setInterval(function () {
      var liveEls = document.querySelectorAll('[data-live-timer]');
      if (!liveEls.length) {
        clearInterval(_timerInterval); _timerInterval = null;
        _timerTickCount = 0;
        return;
      }
      liveEls.forEach(function (el) {
        var s = el.getAttribute('data-start');
        if (s) el.textContent = '● REC ' + formatElapsed(s);
      });
      // Heartbeat: every 60 ticks (~60 seconds) ping backend for each running timer
      _timerTickCount++;
      if (_timerTickCount >= 60) {
        _timerTickCount = 0;
        Object.keys(_activeTimers).forEach(function (taskId) {
          var session = _activeTimers[taskId];
          if (session && session.logId && session.logId !== 'PENDING') {
            APP.call('heartbeatTimer', session.logId, APP.token).catch(function () { /* benign */ });
          }
        });
      }
    }, 1000);
  }

  function activateTimer(taskId, logId, startedAt) {
    _activeTimers[taskId] = { logId: logId, startedAt: startedAt || new Date().toISOString() };
    ensureTickerRunning();
  }
  function deactivateTimer(taskId) {
    delete _activeTimers[taskId];
  }

  function loadTasks(screen) {
    var fetchPromise;
    if (_activeScope === 'mine') {
      fetchPromise = APP.call('getTasks', null, APP.token);
    } else {
      // team and shared both pull team-wide; shared is filtered client-side
      fetchPromise = APP.call('getTeamTasks', {}, APP.token);
    }
    fetchPromise.then(function (tasks) {
      tasks = tasks || [];
      if (_activeScope === 'shared') {
        tasks = tasks.filter(function (t) { return t.isShared === true || t.shared === true; });
      }
      _allTasks = tasks;
      renderAll(screen);
      ensureTickerRunning();
    }).catch(function (err) { APP.showError(err); });

    // Hydrate ALL active timers for current user (multi-timer)
    APP.call('getActiveTimers', APP.currentUser.id, APP.token).then(function (sessions) {
      _activeTimers = {};
      (sessions || []).forEach(function (s) {
        if (s && s.taskId && s.logId) {
          _activeTimers[s.taskId] = { logId: s.logId, startedAt: s.startedAt || new Date().toISOString() };
        }
      });
      renderAll(screen);
      ensureTickerRunning();
    }).catch(function () { /* benign — first deploy may not have getActiveTimers yet */ });
  }

  // ── search ────────────────────────────────────────────────────────────────

  function openSearch(screen) {
    var overlay = screen.querySelector('#kh-search-overlay');
    var input = screen.querySelector('#kh-search-input');
    var results = screen.querySelector('#kh-search-results');
    var closeBtn = screen.querySelector('#kh-search-close');
    if (!overlay) return;

    overlay.style.removeProperty('display');
    input.value = '';
    results.innerHTML = '<p class="text-on-surface-variant text-sm text-center mt-8">Type to search tasks…</p>';
    input.focus();

    var _debounce;
    function doSearch() {
      var q = input.value.trim();
      if (!q) {
        results.innerHTML = '<p class="text-on-surface-variant text-sm text-center mt-8">Type to search tasks…</p>';
        return;
      }
      results.innerHTML = '<p class="text-on-surface-variant text-sm text-center mt-8">Searching…</p>';
      APP.call('searchTasks', q, APP.token).then(function(tasks) {
        if (!tasks || tasks.length === 0) {
          results.innerHTML = '<p class="text-on-surface-variant text-sm text-center mt-8">No tasks found for “' + q + '”</p>';
          return;
        }
        results.innerHTML = tasks.map(function(t) {
          var priorityColors = { urgent: '#DC2626', high: '#FF6D00', medium: '#4F46E5', low: '#10B981' };
          var dotColor = priorityColors[t.priority] || '#D3CFC7';
          var clientName = (t.client && t.client.name) ? t.client.name : (t.clientId || '');
          return '<div class="flex items-center gap-3 p-3 rounded-xl bg-surface-container-low hover:bg-surface-container active:scale-[0.98] cursor-pointer transition-all" data-action="open-task" data-task-id="' + t.id + '">' +
            '<div class="w-2.5 h-2.5 rounded-full shrink-0" style="background:' + dotColor + '"></div>' +
            '<div class="flex-1 min-w-0">' +
              '<p class="text-sm font-medium text-on-surface truncate">' + escHtml(t.title) + '</p>' +
              (clientName ? '<p class="text-xs text-on-surface-variant truncate">' + escHtml(clientName) + '</p>' : '') +
            '</div>' +
            '<span class="text-xs text-on-surface-variant shrink-0 capitalize">' + (t.status || '') + '</span>' +
          '</div>';
        }).join('');
        // Tap to open task
        results.querySelectorAll('[data-action="open-task"]').forEach(function(row) {
          row.addEventListener('click', function() {
            closeSearch(screen);
            APP.navigate('task-detail-sheet', { taskId: row.getAttribute('data-task-id') });
          });
        });
      }).catch(function() {
        results.innerHTML = '<p class="text-error text-sm text-center mt-8">Search failed. Try again.</p>';
      });
    }

    input.addEventListener('input', function() {
      clearTimeout(_debounce);
      _debounce = setTimeout(doSearch, 400);
    });
    input.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeSearch(screen);
    });
    closeBtn.addEventListener('click', function() { closeSearch(screen); });
  }

  function closeSearch(screen) {
    var overlay = screen.querySelector('#kh-search-overlay');
    if (overlay) overlay.style.display = 'none';
  }

  // ── event delegation ─────────────────────────────────────────────────────

  function handleClick(e, screen) {
    var btn = e.target.closest('[data-action]');
    var nav = e.target.closest('[data-nav]');

    if (nav) {
      APP.navigate(nav.dataset.nav);
      return;
    }

    if (!btn) return;
    var action = btn.dataset.action;

    if (action === 'search') {
      openSearch(screen);
      return;
    }

    if (action === 'add-task' || action === 'add-task-col') {
      APP.navigate('add-edit-task');
      return;
    }

    if (action === 'notifications') {
      APP.navigate('notifications');
      return;
    }

    if (action === 'open-task') {
      var taskId = btn.dataset.taskId;
      APP.navigate('task-detail-sheet', { taskId: taskId });
      return;
    }

    if (action === 'start-timer') {
      var taskId = btn.dataset.taskId;
      e.stopPropagation();
      e.preventDefault();

      // OPTIMISTIC: activate inline timer + re-render so play→stop instantly
      var optimisticStart = new Date().toISOString();
      activateTimer(taskId, 'PENDING', optimisticStart);
      // Reflect status locally so renderCard puts the task in In Progress
      var localTask = _allTasks.find(function (t) { return t.id === taskId; });
      if (localTask) localTask.status = 'in-progress';
      renderAll(screen);

      APP.call('startTimer', taskId, APP.token).then(function (session) {
        if (!session || !session.logId) {
          deactivateTimer(taskId);
          if (localTask) localTask.status = 'todo';
          renderAll(screen);
          if (session && session.error === 'not_claimed') {
            APP.showError('Claim this shared task before starting the timer');
          } else {
            APP.showError((session && session.error) || 'Could not start timer');
          }
          return;
        }
        // Reconcile with real logId + startedAt from server
        _activeTimers[taskId] = { logId: session.logId, startedAt: session.startedAt || optimisticStart };
        loadTasks(screen);
      }).catch(function (err) {
        deactivateTimer(taskId);
        if (localTask) localTask.status = 'todo';
        renderAll(screen);
        APP.showError(err);
      });
      return;
    }

    if (action === 'mark-done') {
      e.stopPropagation();
      e.preventDefault();
      var taskId = btn.dataset.taskId;
      if (btn._busy) return; btn._busy = true;
      APP.call('markTaskDone', taskId, APP.token).then(function () {
        deactivateTimer(taskId);
        loadTasks(screen);
      }).catch(function (err) {
        APP.showError(err);
      }).then(function () { btn._busy = false; });
      return;
    }

    if (action === 'stop-timer') {
      e.stopPropagation();
      e.preventDefault();
      var taskId = btn.dataset.taskId;
      var session = _activeTimers[taskId];
      if (!session || !session.logId || session.logId === 'PENDING') {
        APP.showError('Timer for this task is still starting — try again in a moment');
        return;
      }
      // OPTIMISTIC: deactivate + re-render instantly
      var snapshot = session;
      deactivateTimer(taskId);
      renderAll(screen);

      APP.call('stopTimer', session.logId, APP.token).then(function () {
        loadTasks(screen);
      }).catch(function (err) {
        // Roll back optimistic stop
        _activeTimers[taskId] = snapshot;
        renderAll(screen);
        ensureTickerRunning();
        APP.showError(err);
      });
      return;
    }
  }

  function handleFilterClick(e, screen) {
    var btn = e.target.closest('.filter-btn');
    if (!btn) return;
    _activeFilter = btn.dataset.filter || 'all';
    try { sessionStorage.setItem('kh.filter', _activeFilter); } catch(_) {}
    syncFilterChips(screen);
    renderAll(screen);
  }
  function syncFilterChips(screen) {
    screen.querySelectorAll('.filter-btn').forEach(function (b) {
      var on = b.dataset.filter === _activeFilter;
      b.classList.toggle('bg-primary-container', on);
      b.classList.toggle('text-on-primary-container', on);
      b.classList.toggle('border', !on);
      b.classList.toggle('border-outline', !on);
      b.classList.toggle('text-on-surface-variant', !on);
    });
  }

  // ── drag-drop (basic HTML5) ───────────────────────────────────────────────

  function setupDragDrop(screen) {
    screen.addEventListener('dragstart', function (e) {
      var card = e.target.closest('article[data-task-id]');
      if (!card) return;
      e.dataTransfer.setData('text/plain', card.dataset.taskId);
    });
    screen.querySelectorAll('[data-col-status]').forEach(function (col) {
      col.addEventListener('dragover', function (e) { e.preventDefault(); });
      col.addEventListener('drop', function (e) {
        e.preventDefault();
        var taskId = e.dataTransfer.getData('text/plain');
        var newStatus = col.dataset.colStatus;
        if (!taskId || !newStatus) return;
        var task = _allTasks.find(function (t) { return t.id === taskId; });
        if (task && task.status !== newStatus) {
          task.status = newStatus;
          APP.call('updateTaskStatus', taskId, newStatus, APP.token).then(function () {
            renderAll(screen);
          }).catch(function (err) { APP.showError(err); });
        }
      });
    });
    screen.querySelectorAll('article[data-task-id]').forEach(function (el) {
      el.setAttribute('draggable', 'true');
    });
  }

  // ── registration ──────────────────────────────────────────────────────────

  APP.register('kanban-home', {
    mount: function (params) {
      if (!APP.currentUser) { APP.navigate('pin-login'); return; }
      var screen = document.querySelector('[data-screen="kanban-home"]');

      // Header avatar
      var _khAvatarEl = screen.querySelector('#kh-header-avatar');
      if (_khAvatarEl) {
        if (APP.currentUser.avatar) {
          _khAvatarEl.innerHTML = '<img alt="' + (APP.currentUser.name || 'User') + '" class="w-full h-full object-cover" src="' + APP.currentUser.avatar + '"/>';
        } else {
          var _khIni = (APP.currentUser.name || 'U').split(' ').map(function(w){return w[0];}).join('').toUpperCase().slice(0,2);
          _khAvatarEl.textContent = _khIni;
        }
      }

      screen._clickHandler = function (e) {
        var scopeBtn = e.target.closest('.scope-btn');
        if (scopeBtn) {
          _activeScope = scopeBtn.dataset.scope || 'mine';
          try { sessionStorage.setItem('kh.scope', _activeScope); } catch(_) {}
          applyScopeVisibility(screen);
          loadTasks(screen);
          return;
        }
        var viewBtn = e.target.closest('.view-tab');
        if (viewBtn) {
          _activeView = viewBtn.dataset.view || 'board';
          try { sessionStorage.setItem('kh.view', _activeView); } catch(_) {}
          applyViewVisibility(screen);
          renderAll(screen);
          ensureTickerRunning();
          return;
        }
        handleClick(e, screen);
        handleFilterClick(e, screen);
      };
      screen.addEventListener('click', screen._clickHandler);

      applyScopeVisibility(screen);
      applyViewVisibility(screen);
      syncFilterChips(screen);
      loadTasks(screen);
      setupDragDrop(screen);
    },
    unmount: function () {
      clearInterval(_timerInterval);
      _timerInterval = null;
      _timerTickCount = 0;
      var screen = document.querySelector('[data-screen="kanban-home"]');
      if (screen && screen._clickHandler) {
        screen.removeEventListener('click', screen._clickHandler);
        screen._clickHandler = null;
      }
    }
  });
}());
</script>
