<div data-screen="pin-login" class="bg-background w-full flex flex-col items-center justify-center py-8 font-body-standard text-on-background" style="min-height:100dvh">

  <!-- Branding -->
  <div class="flex flex-col items-center justify-center flex-shrink-0 mb-8 w-full max-w-md px-margin-edge">
    <div class="w-16 h-16 rounded-2xl bg-primary flex items-center justify-center mb-4 shadow-sm">
      <span class="material-symbols-outlined text-on-primary" style="font-variation-settings: 'FILL' 1; font-size: 32px;">bolt</span>
    </div>
    <h1 class="text-on-surface mb-1" style="font-size: 28px; line-height: 1.2; font-weight: 700; letter-spacing: -0.01em;">TaskFlow</h1>
    <p class="text-on-surface-variant" style="font-size: 13px;">Your work. Your pace.</p>
  </div>

  <!-- User Selector -->
  <div class="w-full max-w-md px-margin-edge mb-6">
    <div class="flex flex-row overflow-x-auto hide-scrollbar gap-4 pb-2 items-start px-2" data-area="user-selector">
      <!-- Users rendered dynamically -->
    </div>
  </div>

  <!-- Error message -->
  <div class="w-full max-w-md px-margin-edge mb-2 text-center" style="min-height:20px">
    <span class="text-error font-label-bold text-sm" data-pin-error style="display:none"></span>
  </div>

  <!-- PIN Dots -->
  <div class="flex flex-row justify-center items-center gap-[14px] mb-8 w-full" data-area="pin-dots">
    <div class="pin-dot pin-dot-empty shadow-sm" data-dot="0"></div>
    <div class="pin-dot pin-dot-empty shadow-sm" data-dot="1"></div>
    <div class="pin-dot pin-dot-empty shadow-sm" data-dot="2"></div>
    <div class="pin-dot pin-dot-empty shadow-sm" data-dot="3"></div>
  </div>

  <!-- PIN Pad -->
  <div class="grid grid-cols-3 gap-[10px] w-auto max-w-[234px] mx-auto pb-8">
    <button class="pin-btn shadow-sm hover:bg-surface-container-low transition-colors cursor-pointer" data-digit="1">1</button>
    <button class="pin-btn shadow-sm hover:bg-surface-container-low transition-colors cursor-pointer" data-digit="2">2</button>
    <button class="pin-btn shadow-sm hover:bg-surface-container-low transition-colors cursor-pointer" data-digit="3">3</button>
    <button class="pin-btn shadow-sm hover:bg-surface-container-low transition-colors cursor-pointer" data-digit="4">4</button>
    <button class="pin-btn shadow-sm hover:bg-surface-container-low transition-colors cursor-pointer" data-digit="5">5</button>
    <button class="pin-btn shadow-sm hover:bg-surface-container-low transition-colors cursor-pointer" data-digit="6">6</button>
    <button class="pin-btn shadow-sm hover:bg-surface-container-low transition-colors cursor-pointer" data-digit="7">7</button>
    <button class="pin-btn shadow-sm hover:bg-surface-container-low transition-colors cursor-pointer" data-digit="8">8</button>
    <button class="pin-btn shadow-sm hover:bg-surface-container-low transition-colors cursor-pointer" data-digit="9">9</button>
    <div class="w-[68px] h-[68px]"></div>
    <button class="pin-btn shadow-sm hover:bg-surface-container-low transition-colors cursor-pointer" data-digit="0">0</button>
    <button class="pin-btn shadow-sm hover:bg-surface-container-low transition-colors cursor-pointer flex items-center justify-center" data-action="backspace" aria-label="Backspace">
      <span class="material-symbols-outlined text-[#1F2328]">backspace</span>
    </button>
  </div>

</div>

<script>
(function () {
  var _users = [];
  var _selectedUserId = null;
  var _pin = [];
  var _attempts = 0;
  var _maxAttempts = 3;
  var _locked = false;
  var _lockTimeout = null;
  var PIN_LENGTH = 4;

  function escHtml(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function initials(name) {
    return (name || '?').split(' ').map(function (w) { return w[0]; }).join('').toUpperCase().slice(0, 2);
  }

  function getScreen() {
    return document.querySelector('[data-screen="pin-login"]');
  }

  function updateDots(screen) {
    screen.querySelectorAll('[data-dot]').forEach(function (dot, i) {
      dot.classList.toggle('pin-dot-filled', i < _pin.length);
      dot.classList.toggle('pin-dot-empty', i >= _pin.length);
    });
  }

  function showError(screen, msg) {
    var el = screen.querySelector('[data-pin-error]');
    if (!el) return;
    el.textContent = msg;
    el.style.display = msg ? '' : 'none';
  }

  function shakePin(screen) {
    var dotsArea = screen.querySelector('[data-area="pin-dots"]');
    if (!dotsArea) return;
    dotsArea.classList.add('shake-anim');
    setTimeout(function () { dotsArea.classList.remove('shake-anim'); }, 500);
  }

  function setPadDisabled(screen, disabled) {
    screen.querySelectorAll('[data-digit], [data-action="backspace"]').forEach(function (btn) {
      btn.disabled = disabled;
      btn.style.opacity = disabled ? '0.4' : '';
    });
  }

  function renderUsers(screen) {
    var area = screen.querySelector('[data-area="user-selector"]');
    if (!area) return;
    // Semantic token-based avatar backgrounds (per Stitch reference)
    var avatarBgs = ['bg-secondary-container','bg-tertiary-fixed','bg-surface-variant','bg-primary-fixed'];
    var avatarTextColors = ['text-on-secondary-container','text-on-tertiary-fixed','text-on-surface-variant','text-on-primary-fixed'];
    var userHtml = _users.map(function (u, idx) {
      var isSelected = u.id === _selectedUserId;
      var bg = isSelected ? 'bg-primary-container border-2 border-primary' : avatarBgs[idx % avatarBgs.length];
      var size = isSelected ? 'w-10 h-10' : 'w-8 h-8 mt-1';
      var textSize = isSelected ? 'text-sm' : 'text-xs';
      var initialsColor = isSelected ? 'text-primary' : avatarTextColors[idx % avatarTextColors.length];
      var nameColor = isSelected ? 'text-on-surface' : 'text-on-surface-variant';
      var opacity = isSelected ? '' : 'opacity-70 hover:opacity-100';
      return '<div class="flex flex-col items-center flex-shrink-0 cursor-pointer transition-opacity ' + opacity + '" data-action="select-user" data-user-id="' + escHtml(String(u.id)) + '">' +
        '<div class="' + size + ' rounded-full ' + bg + ' flex items-center justify-center mb-1">' +
          '<span class="font-title-main text-title-main ' + initialsColor + ' ' + textSize + '">' + escHtml(initials(u.name)) + '</span>' +
        '</div>' +
        '<span class="font-label-bold text-label-bold ' + nameColor + '" style="font-size:11px">' + escHtml((u.name || '').split(' ')[0]) + '</span>' +
      '</div>';
    }).join('');
    // Append "Add user" affordance (per Stitch reference)
    var addTile = '<div class="flex flex-col items-center flex-shrink-0 cursor-pointer transition-opacity opacity-70 hover:opacity-100" data-action="add-user">' +
      '<div class="w-8 h-8 mt-1 rounded-full bg-surface-variant flex items-center justify-center mb-1">' +
        '<span class="material-symbols-outlined text-on-surface-variant" style="font-size:18px">add</span>' +
      '</div>' +
      '<span class="font-label-bold text-label-bold text-on-surface-variant" style="font-size:11px">Add</span>' +
    '</div>';
    area.innerHTML = userHtml + addTile;
  }

  function selectUser(screen, userId) {
    _selectedUserId = userId;
    _pin = [];
    _attempts = 0;
    updateDots(screen);
    showError(screen, '');
    renderUsers(screen);
  }

  function addDigit(screen, digit) {
    if (_locked) return;
    if (!_selectedUserId) { showError(screen, 'Please select a user first.'); return; }
    if (_pin.length >= PIN_LENGTH) return;
    _pin.push(digit);
    updateDots(screen);
    if (_pin.length === PIN_LENGTH) { submitPin(screen); }
  }

  function backspace(screen) {
    if (_locked) return;
    if (_pin.length > 0) { _pin.pop(); updateDots(screen); }
  }

  function submitPin(screen) {
    var enteredPin = _pin.join('');
    setPadDisabled(screen, true);

    APP.call('validatePin', _selectedUserId, enteredPin).then(function (result) {
      // Server returns { error: 'invalid_pin' | 'locked' } on failure — not a throw
      if (result && result.error === 'locked') {
        _pin = [];
        updateDots(screen);
        setPadDisabled(screen, true);
        _locked = true;
        var mins = result.minutesLeft || 1;
        showError(screen, 'Account locked. Try again in ' + mins + ' min' + (mins === 1 ? '' : 's') + '.');
        shakePin(screen);
        return;
      }

      if (result && result.error) {
        _pin = [];
        updateDots(screen);
        _attempts++;
        setPadDisabled(screen, false);
        var left = result.attemptsLeft !== undefined ? result.attemptsLeft : (_maxAttempts - _attempts);
        showError(screen, 'Incorrect PIN.' + (left > 0 ? ' ' + left + ' attempt' + (left === 1 ? '' : 's') + ' left.' : ''));
        shakePin(screen);
        return;
      }

      // Success
      APP.currentUser = {
        name: (result && result.name) || (_users.find(function (u) { return u.id === _selectedUserId; }) || {}).name || '',
        role: (result && result.role) || 'member',
        id:   (result && result.userId) || _selectedUserId,
        avatarColor: (result && result.avatarColor) || ''
      };
      APP.token = (result && result.token) || null;
      // Persist session so an accidental reload restores state
      try {
        if (APP.token) {
          sessionStorage.setItem('tf_token', APP.token);
          sessionStorage.setItem('tf_user', JSON.stringify(APP.currentUser));
        }
      } catch(se) {}
      _pin = [];
      _attempts = 0;
      APP.navigate('kanban-home');
    }).catch(function (err) {
      _pin = [];
      updateDots(screen);
      setPadDisabled(screen, false);
      showError(screen, 'Login failed. Please try again.');
      shakePin(screen);
    });
  }

  function handleClick(e, screen) {
    var btn = e.target.closest('[data-digit]');
    if (btn) { addDigit(screen, btn.dataset.digit); return; }
    var action = e.target.closest('[data-action]');
    if (!action) return;
    if (action.dataset.action === 'backspace') { backspace(screen); return; }
    if (action.dataset.action === 'select-user') { selectUser(screen, action.dataset.userId); return; }
  }

  function handleKeydown(e, screen) {
    if (e.key >= '0' && e.key <= '9') { addDigit(screen, e.key); return; }
    if (e.key === 'Backspace') { backspace(screen); return; }
  }

  APP.register('pin-login', {
    mount: function (params) {
      var screen = getScreen();
      _pin = [];
      _attempts = 0;
      _locked = false;
      clearTimeout(_lockTimeout);
      showError(screen, '');
      updateDots(screen);
      setPadDisabled(screen, false);

      screen._clickHandler = function (e) { handleClick(e, screen); };
      screen._keyHandler   = function (e) { handleKeydown(e, screen); };
      screen.addEventListener('click', screen._clickHandler);
      document.addEventListener('keydown', screen._keyHandler);

      // Show loading state while fetching users
      var area = screen.querySelector('[data-area="user-selector"]');
      if (area) area.innerHTML = '<span style="font-size:12px;color:#6B7280;padding:8px">Loading users…</span>';

      APP.call('getUsersForLogin').then(function (users) {
        _users = (users || []).filter(function(u) { return u.id !== '__error__'; });
        var errorUser = (users || []).find(function(u) { return u.id === '__error__'; });

        if (errorUser && area) {
          area.innerHTML = '<span style="font-size:11px;color:#DC2626;padding:8px;display:block">' + escHtml(errorUser.name) + '</span>';
          return;
        }
        if (_users.length > 0 && !_selectedUserId) { _selectedUserId = _users[0].id; }
        if (_users.length === 0 && area) {
          area.innerHTML = '<span style="font-size:11px;color:#DC2626;padding:8px">No active users found. Run initializeSheets() in GAS editor.</span>';
          return;
        }
        renderUsers(screen);
      }).catch(function (err) {
        var msg = err && (err.message || err) || 'Unknown error';
        if (area) area.innerHTML = '<span style="font-size:11px;color:#DC2626;padding:8px">Failed to load users: ' + escHtml(String(msg)) + '</span>';
      });
    },
    unmount: function () {
      clearTimeout(_lockTimeout);
      _lockTimeout = null;
      var screen = getScreen();
      if (screen && screen._clickHandler) { screen.removeEventListener('click', screen._clickHandler); screen._clickHandler = null; }
      if (screen && screen._keyHandler) { document.removeEventListener('keydown', screen._keyHandler); screen._keyHandler = null; }
    }
  });
}());
</script>
