<div data-screen="myday-focus">
<!-- TopAppBar -->
<header class="docked full-width top-0 h-nav-height border-b border-outline-variant dark:border-outline shadow-sm flex justify-between items-center px-margin-edge w-full z-50 bg-surface dark:bg-surface-dim active:scale-95 transition-transform sticky top-0">
<div class="flex items-center gap-3">
<div data-ref="user-avatar" class="w-8 h-8 rounded-full bg-primary-fixed flex items-center justify-center text-primary font-bold text-sm border border-outline-variant">?</div>
<h1 class="font-title-main-mobile text-title-main-mobile font-bold text-primary dark:text-primary-fixed-dim">My Day</h1>
</div>
<div class="flex items-center gap-4 text-on-surface-variant dark:text-surface-variant">
<span data-ref="date-label" class="font-label-bold text-label-bold text-on-surface-variant"></span>
<button class="hover:bg-surface-container-high dark:hover:bg-surface-container-highest transition-colors p-2 rounded-full text-primary dark:text-primary-fixed-dim">
<span class="material-symbols-outlined">search</span>
</button>
</div>
</header>

<!-- Main Canvas -->
<main class="flex-1 w-full max-w-2xl mx-auto px-margin-edge pt-4 flex flex-col gap-6 pb-32">
<!-- Morning Greeting Card -->
<div class="h-[80px] bg-primary-fixed rounded-xl px-4 flex justify-between items-center shadow-sm">
<div class="flex items-center gap-3">
<div data-ref="greeting-avatar" class="w-10 h-10 rounded-full bg-primary flex items-center justify-center text-white font-bold border border-outline-variant">?</div>
<h2 data-ref="greeting-text" class="font-title-main text-title-main text-on-primary-container">Good morning</h2>
</div>
<div class="text-right">
<p data-ref="summary-bar-top" class="font-label-bold text-label-bold text-on-surface-variant">Loading...</p>
</div>
</div>

<!-- Overdue Section -->
<section class="flex flex-col gap-2">
<button data-ref="toggle-overdue" class="flex items-center justify-between w-full h-[32px] group">
<div class="flex items-center gap-2 text-error">
<span class="material-symbols-outlined text-[18px]">warning</span>
<span class="font-label-bold text-label-bold tracking-wider uppercase">Overdue</span>
<span data-ref="overdue-count" class="text-[11px] font-bold ml-1"></span>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:text-on-surface transition-colors">expand_more</span>
</button>
<div data-ref="overdue-list" class="flex flex-col gap-2"></div>
</section>

<!-- In Progress Section -->
<section class="flex flex-col gap-2">
<button data-ref="toggle-inprogress" class="flex items-center justify-between w-full h-[32px] group">
<div class="flex items-center gap-2 text-primary">
<span class="material-symbols-outlined fill-icon text-[18px]">play_circle</span>
<span class="font-label-bold text-label-bold tracking-wider uppercase">In Progress</span>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:text-on-surface transition-colors">expand_more</span>
</button>
<div data-ref="inprogress-list" class="flex flex-col gap-2"></div>
</section>

<!-- Today Section -->
<section class="flex flex-col gap-2">
<button data-ref="toggle-today" class="flex items-center justify-between w-full h-[32px] group">
<div class="flex items-center gap-2 text-on-surface">
<span class="material-symbols-outlined text-[18px]">list_alt</span>
<span class="font-label-bold text-label-bold tracking-wider uppercase">Today</span>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:text-on-surface transition-colors">expand_more</span>
</button>
<div data-ref="today-list" class="flex flex-col gap-2"></div>
</section>

<!-- Shared Pool Section -->
<div class="mt-4 pt-4 border-t border-outline-variant dark:border-outline">
<section class="flex flex-col gap-2">
<button data-ref="toggle-pool" class="flex items-center justify-between w-full h-[32px] group">
<div class="flex items-center gap-2 text-[#9334E6]">
<span class="material-symbols-outlined text-[18px]">group</span>
<span data-ref="pool-label" class="font-label-bold text-label-bold tracking-wider uppercase font-semibold text-[#9334E6]">Shared Pool</span>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:text-on-surface transition-colors">expand_more</span>
</button>
<div data-ref="pool-list" class="flex flex-col gap-2"></div>
</section>
</div>
</main>

<!-- Bottom Summary Bar (desktop) -->
<div class="fixed bottom-nav-height w-full h-[40px] bg-surface-container items-center justify-center gap-4 text-on-surface-variant font-label-bold text-label-bold z-40 border-t border-outline-variant dark:border-outline shadow-md hidden md:flex" style="bottom: 56px;">
<span class="flex items-center gap-1"><span class="material-symbols-outlined text-[16px]">check_circle</span> <span data-ref="bar-done-desktop">0</span> done</span>
<span>·</span>
<span class="flex items-center gap-1"><span class="material-symbols-outlined text-[16px]">list</span> <span data-ref="bar-left-desktop">0</span> left</span>
<span>·</span>
<span class="flex items-center gap-1"><span class="material-symbols-outlined text-[16px]">schedule</span> <span data-ref="bar-hours">0</span>h logged today</span>
</div>
<!-- Bottom Summary Bar (mobile) -->
<div data-ref="summary-bar" class="fixed w-full h-[40px] bg-surface-container flex md:hidden items-center justify-center gap-2 text-on-surface-variant font-label-bold text-label-bold z-40 border-t border-outline-variant dark:border-outline shadow-[0_-2px_4px_rgba(0,0,0,0.05)] text-[10px]" style="bottom: 56px;">
<span class="flex items-center gap-1"><span class="material-symbols-outlined text-[14px]">check_circle</span> <span data-ref="bar-done">0</span> done</span>
<span>·</span>
<span class="flex items-center gap-1"><span class="material-symbols-outlined text-[14px]">list</span> <span data-ref="bar-left">0</span> left</span>
<span>·</span>
<span class="flex items-center gap-1"><span class="material-symbols-outlined text-[14px]">schedule</span> <span data-ref="bar-hours-mobile">0</span>h today</span>
</div>

<!-- FAB -->
<button data-ref="fab-add" class="fixed right-margin-edge bottom-[112px] w-fab-size h-fab-size rounded-full bg-primary-container text-on-primary-container shadow-lg flex items-center justify-center z-50 hover:bg-primary transition-colors active:scale-95">
<span class="material-symbols-outlined">add</span>
</button>

<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full h-nav-height z-50 flex justify-around items-center px-2 bg-surface dark:bg-surface-dim shadow-lg md:hidden border-t border-outline-variant dark:border-outline">
<button data-ref="nav-home" class="flex flex-col items-center justify-center text-on-surface-variant dark:text-surface-variant px-4 py-1 hover:bg-surface-container-low dark:hover:bg-surface-container-high active:scale-90 transition-all duration-200">
<span class="material-symbols-outlined">home</span>
<span class="font-label-bold text-label-bold">Home</span>
</button>
<button data-ref="nav-myday" class="flex flex-col items-center justify-center bg-secondary-container dark:bg-secondary-fixed-dim text-on-secondary-container dark:text-on-secondary-fixed rounded-2xl px-4 py-1 active:scale-90 transition-all duration-200">
<span class="material-symbols-outlined fill-icon">calendar_today</span>
<span class="font-label-bold text-label-bold">My Day</span>
</button>
<button data-ref="nav-team" class="flex flex-col items-center justify-center text-on-surface-variant dark:text-surface-variant px-4 py-1 hover:bg-surface-container-low dark:hover:bg-surface-container-high active:scale-90 transition-all duration-200">
<span class="material-symbols-outlined">group</span>
<span class="font-label-bold text-label-bold">Team</span>
</button>
<button data-ref="nav-admin" class="flex flex-col items-center justify-center text-on-surface-variant dark:text-surface-variant px-4 py-1 hover:bg-surface-container-low dark:hover:bg-surface-container-high active:scale-90 transition-all duration-200">
<span class="material-symbols-outlined">settings</span>
<span class="font-label-bold text-label-bold">Admin</span>
</button>
</nav>
</div>

<script>
(function() {
  var _pomodoroInterval = null;
  var _pomodoroSeconds = 25 * 60;
  var _pomodoroRunning = false;
  var _allTasks = [];
  var _activeLogId = null;  // tracks current timer log ID

  function qs(screen, ref) {
    return screen.querySelector('[data-ref="' + ref + '"]');
  }

  function getGreeting() {
    var h = new Date().getHours();
    if (h < 12) return 'Good morning';
    if (h < 17) return 'Good afternoon';
    return 'Good evening';
  }

  function formatDate(d) {
    return d.toLocaleDateString('en-IN', { weekday: 'short', day: 'numeric', month: 'short' });
  }

  function buildTaskRow(task, opts) {
    opts = opts || {};
    var isInProgress = task.status === 'in-progress';
    var isDone = task.status === 'done';
    var isPool = opts.pool;

    var borderColor = isDone ? 'border-surface-variant' :
                      task.status === 'in-progress' ? 'border-primary' :
                      opts.overdue ? 'border-error' : 'border-surface-container-highest';

    var row = document.createElement('div');
    var bgClass = isDone ? 'bg-surface-container-low' : 'bg-surface-container-lowest';
    row.className = 'h-[56px] ' + bgClass + ' rounded-xl flex items-center justify-between px-3 shadow-sm border-l-4 ' + borderColor + ' relative' + (isDone ? ' opacity-70' : '');
    row.dataset.taskId = task.id;

    var left = '<div class="flex items-center gap-3 overflow-hidden flex-1">';
    if (isDone) {
      left += '<span class="material-symbols-outlined text-secondary text-[18px]">check_circle</span>';
    } else {
      var dotColor = opts.overdue ? 'bg-error' : isInProgress ? 'bg-primary' : 'bg-outline-variant';
      left += '<div class="w-2 h-2 rounded-full ' + dotColor + ' flex-shrink-0"></div>';
    }
    left += '<div class="flex flex-col overflow-hidden whitespace-nowrap text-ellipsis">' +
      '<span class="font-body-standard text-body-standard font-medium text-on-surface truncate' + (isDone ? ' line-through text-outline' : '') + '">' + (task.title || 'Untitled') + '</span>';
    if (!isDone) left += '<span class="font-label-bold text-label-bold text-on-surface-variant truncate">' + (task.client || task.tags || '') + '</span>';
    left += '</div></div>';

    var right = '<div class="flex items-center gap-2 flex-shrink-0">';
    if (isPool) {
      right += '<button class="btn-claim px-3 py-1.5 rounded-full border border-[#9334E6] text-[#9334E6] flex items-center gap-1 hover:bg-[#9334E6] hover:bg-opacity-10 transition-colors active:scale-95 font-label-bold text-label-bold">Claim <span class="material-symbols-outlined text-[14px]">play_arrow</span></button>';
    } else if (!isDone) {
      if (isInProgress) {
        right += '<button class="btn-stop w-[44px] h-[44px] rounded-full bg-[#EA4335] bg-opacity-10 flex items-center justify-center text-[#EA4335] active:scale-95 relative"><div class="absolute inset-0 rounded-full border-4 border-[#EA4335] border-opacity-20 animate-pulse"></div><span class="material-symbols-outlined fill-icon">stop</span></button>';
      } else {
        right += '<button class="btn-play w-[44px] h-[44px] rounded-full bg-surface-container flex items-center justify-center text-primary hover:bg-surface-container-highest transition-colors active:scale-95"><span class="material-symbols-outlined fill-icon text-[#34A853]">play_arrow</span></button>';
      }
      right += '<button class="btn-detail text-outline-variant hover:text-on-surface transition-colors"><span class="material-symbols-outlined">chevron_right</span></button>';
    }
    right += '</div>';

    row.innerHTML = left + right;
    return row;
  }

  function attachRowHandlers(screen, row, task, opts) {
    opts = opts || {};

    var playBtn = row.querySelector('.btn-play');
    var stopBtn = row.querySelector('.btn-stop');
    var detailBtn = row.querySelector('.btn-detail');
    var claimBtn = row.querySelector('.btn-claim');

    if (playBtn) {
      playBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        APP.call('startTimer', task.id, APP.currentUser.id)
          .then(function(session) {
            if (session && session.logId) _activeLogId = session.logId;
            task.status = 'in-progress';
            refreshLists(screen);
          })
          .catch(function(err) { APP.showError(err); });
      });
    }

    if (stopBtn) {
      stopBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        var logId = _activeLogId || task.id; // fallback: backend resolves taskId too
        APP.call('stopTimer', logId, APP.currentUser.id)
          .then(function() {
            _activeLogId = null;
            task.status = 'todo';
            refreshLists(screen);
          })
          .catch(function(err) { APP.showError(err); });
      });
    }

    if (detailBtn) {
      detailBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        APP.navigate('task-detail-sheet', { taskId: task.id });
      });
    }

    if (claimBtn) {
      claimBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        APP.call('claimTask', task.id, APP.currentUser.id)
          .then(function() {
            task.status = 'todo';
            task._claimed = true;
            refreshLists(screen);
            APP.showSuccess('Task claimed!');
          })
          .catch(function(err) { APP.showError(err); });
      });
    }
  }

  function renderSection(screen, ref, tasks, opts) {
    var container = qs(screen, ref);
    container.innerHTML = '';
    if (!tasks || tasks.length === 0) {
      container.innerHTML = '<div class="text-center text-on-surface-variant py-2 font-label-bold text-[12px]">None</div>';
      return;
    }
    tasks.forEach(function(t) {
      var row = buildTaskRow(t, opts);
      attachRowHandlers(screen, row, t, opts);
      container.appendChild(row);
    });
  }

  function refreshLists(screen) {
    var today = new Date(); today.setHours(0, 0, 0, 0);

    var overdue = _allTasks.filter(function(t) {
      if (t.status === 'done') return false;
      if (!t.dueDate) return false;
      var d = new Date(t.dueDate); d.setHours(0, 0, 0, 0);
      return d < today;
    });
    var inprogress = _allTasks.filter(function(t) { return t.status === 'in-progress'; });
    var todayTasks = _allTasks.filter(function(t) {
      if (t.status === 'done' || t.status === 'in-progress') return false;
      if (!t.dueDate) return true;
      var d = new Date(t.dueDate); d.setHours(0, 0, 0, 0);
      return d.getTime() === today.getTime();
    });

    if (qs(screen, 'overdue-count')) qs(screen, 'overdue-count').textContent = overdue.length > 0 ? '(' + overdue.length + ')' : '';
    renderSection(screen, 'overdue-list', overdue, { overdue: true });
    renderSection(screen, 'inprogress-list', inprogress, {});
    renderSection(screen, 'today-list', todayTasks, {});

    var doneCount = _allTasks.filter(function(t) { return t.status === 'done'; }).length;
    var leftCount = _allTasks.length - doneCount;
    qs(screen, 'bar-done').textContent = doneCount;
    qs(screen, 'bar-left').textContent = leftCount;
    qs(screen, 'summary-bar-top').textContent = _allTasks.length + ' tasks';
  }

  function bindToggle(screen, btnRef, listRef) {
    qs(screen, btnRef).addEventListener('click', function() {
      var list = qs(screen, listRef);
      list.classList.toggle('hidden');
    });
  }

  APP.register('myday-focus', {
    mount: function(params) {
      if (!APP.currentUser) { APP.navigate('pin-login'); return; }

      var screen = document.querySelector('[data-screen="myday-focus"]');

      // Header setup
      var initials = APP.currentUser.name ? APP.currentUser.name.charAt(0).toUpperCase() : '?';
      qs(screen, 'user-avatar').textContent = initials;
      qs(screen, 'greeting-avatar').textContent = initials;
      qs(screen, 'greeting-text').textContent = getGreeting() + ', ' + (APP.currentUser.name || '');
      qs(screen, 'date-label').textContent = formatDate(new Date());

      // Load my day tasks
      APP.call('getMyDayTasks', APP.currentUser.name)
        .then(function(tasks) {
          _allTasks = tasks || [];
          refreshLists(screen);
        })
        .catch(function(err) { APP.showError(err); });

      // Load shared pool
      APP.call('getSharedPoolTasks')
        .then(function(poolTasks) {
          poolTasks = poolTasks || [];
          var unclaimedCount = poolTasks.filter(function(t) { return !t._claimed; }).length;
          qs(screen, 'pool-label').textContent = 'Shared Pool' + (unclaimedCount > 0 ? ' — ' + unclaimedCount + ' unclaimed' : '');
          renderSection(screen, 'pool-list', poolTasks, { pool: true });
          poolTasks.forEach(function(t) {
            var row = qs(screen, 'pool-list').querySelector('[data-task-id="' + t.id + '"]');
            if (row) attachRowHandlers(screen, row, t, { pool: true });
          });
        })
        .catch(function(err) { APP.showError(err); });

      // Section toggles
      bindToggle(screen, 'toggle-overdue', 'overdue-list');
      bindToggle(screen, 'toggle-inprogress', 'inprogress-list');
      bindToggle(screen, 'toggle-today', 'today-list');
      bindToggle(screen, 'toggle-pool', 'pool-list');

      // FAB → add task
      qs(screen, 'fab-add').addEventListener('click', function() {
        APP.navigate('add-edit-task');
      });

      // Bottom nav
      qs(screen, 'nav-home').addEventListener('click', function() { APP.navigate('kanban-home'); });
      qs(screen, 'nav-team').addEventListener('click', function() { APP.navigate('team-board'); });
      qs(screen, 'nav-admin').addEventListener('click', function() { APP.navigate('admin-panel'); });
    },

    unmount: function() {
      if (_pomodoroInterval) {
        clearInterval(_pomodoroInterval);
        _pomodoroInterval = null;
      }
      _pomodoroRunning = false;
      _pomodoroSeconds = 25 * 60;
      _allTasks = [];
    }
  });
})();
</script>
