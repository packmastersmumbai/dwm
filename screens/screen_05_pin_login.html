<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>TaskFlow - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        "colors": {
                "error-container": "#ffdad6",
                "surface-container-highest": "#e1e3e4",
                "inverse-on-surface": "#f0f1f2",
                "surface-container-high": "#e7e8e9",
                "on-error-container": "#93000a",
                "primary": "#005bbf",
                "error": "#ba1a1a",
                "surface-dim": "#d9dadb",
                "tertiary-fixed-dim": "#ffb68b",
                "outline-variant": "#c1c6d6",
                "on-secondary-fixed-variant": "#005320",
                "outline": "#727785",
                "on-primary-fixed-variant": "#004493",
                "on-error": "#ffffff",
                "secondary": "#006e2c",
                "tertiary-container": "#bf5900",
                "inverse-surface": "#2e3132",
                "primary-container": "#1a73e8",
                "secondary-fixed-dim": "#6ddd81",
                "on-tertiary-fixed-variant": "#753400",
                "on-primary": "#ffffff",
                "on-tertiary": "#ffffff",
                "surface-container": "#edeeef",
                "inverse-primary": "#adc7ff",
                "tertiary": "#994600",
                "surface-tint": "#005bc0",
                "on-surface": "#191c1d",
                "on-tertiary-container": "#ffffff",
                "on-secondary": "#ffffff",
                "on-secondary-container": "#00722f",
                "background": "#f8f9fa",
                "surface-container-low": "#f3f4f5",
                "on-surface-variant": "#414754",
                "secondary-container": "#86f898",
                "primary-fixed-dim": "#adc7ff",
                "on-tertiary-fixed": "#321200",
                "on-background": "#191c1d",
                "surface-variant": "#e1e3e4",
                "surface": "#f8f9fa",
                "primary-fixed": "#d8e2ff",
                "on-secondary-fixed": "#002108",
                "on-primary-container": "#ffffff",
                "tertiary-fixed": "#ffdbc9",
                "surface-bright": "#f8f9fa",
                "surface-container-lowest": "#ffffff",
                "on-primary-fixed": "#001a41",
                "secondary-fixed": "#89fa9b"
        },
        "borderRadius": {
                "DEFAULT": "0.25rem",
                "lg": "0.5rem",
                "xl": "0.75rem",
                "full": "9999px"
        },
        "spacing": {
                "fab-size": "56px",
                "stack-tight": "0.25rem",
                "nav-height": "56px",
                "margin-edge": "1rem",
                "touch-target": "48px",
                "gutter-card": "0.75rem"
        },
        "fontFamily": {
                "title-main-mobile": [
                        "Inter"
                ],
                "label-bold": [
                        "Inter"
                ],
                "timer-display": [

                ],
                "title-main": [

                "body-standard": [

                ]

        "fontSize": {
                "title-main-mobile": [
                        "18px",

                                "lineHeight": "24px",

                ],

                        "12px",
                        {

                                "fontWeight": "500"
                        }
                ],
                "timer-display": [

                        "14px",

                                "lineHeight": "20px",
                                "fontWeight": "400"

},
    },
  }

<style>
    /* Material Symbols setup */
    .material-symbols-outlined {
      font-family: 'Material Symbols Outlined';
      font-weight: normal;
      font-style: normal;
      font-size: 24px;
      line-height: 1;
      letter-spacing: normal;
      text-transform: none;
      display: inline-block;
      white-space: nowrap;
      word-wrap: normal;
      direction: ltr;
      -webkit-font-feature-settings: 'liga';
      -webkit-font-smoothing: antialiased;
    }
    
    /* Custom utility classes based on prompt constraints */
    .pin-btn {
        width: 68px;
        height: 68px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 9999px;
        font-family: 'Inter', sans-serif;
        font-size: 24px;
        font-weight: 400;
        background-color: #ffffff;
        border: 1px solid #DADCE0;
        color: #202124;
    }
    
    .pin-btn:active {
        background-color: #E8F0FE;
        border-color: #1A73E8;
    }

    .pin-dot {
        width: 20px;
        height: 20px;
        border-radius: 9999px;
    }

    .pin-dot-empty {
        border: 1.5px solid #DADCE0;
    }

    .pin-dot-filled {
        background-color: #1A73E8;
    }
    
    .hide-scrollbar::-webkit-scrollbar {
        display: none;
    }
    .hide-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
    }
</style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background h-screen w-full flex flex-col items-center justify-center overflow-hidden font-body-standard text-on-background">
<!-- Top Section (approx top 35%) -->
<div class="flex flex-col items-center justify-center flex-shrink-0 mb-8 w-full max-w-md px-margin-edge">
<div class="w-16 h-16 rounded-full bg-primary-container flex items-center justify-center mb-4 shadow-sm">
<span class="material-symbols-outlined text-white" style="font-variation-settings: 'FILL' 1; font-size: 32px;">bolt</span>
</div>
<h1 class="font-title-main text-title-main text-[#202124] mb-1" style="font-size: 24px; line-height: 1.2; font-weight: 700;">TaskFlow</h1>
<p class="font-body-standard text-body-standard text-[#9AA0A6]" style="font-size: 13px;">Your work. Your pace.</p>
</div>
<!-- User Select Horizontal Scroll -->
<div class="w-full max-w-md px-margin-edge mb-6">
<div class="flex flex-row overflow-x-auto hide-scrollbar gap-4 pb-2 items-start px-2">
<!-- Selected User -->
<div class="flex flex-col items-center flex-shrink-0 cursor-pointer">
<div class="w-10 h-10 rounded-full bg-[#E8F0FE] border-2 border-[#1A73E8] flex items-center justify-center mb-1">
<span class="font-title-main text-title-main text-primary-container text-sm">JS</span>
</div>
<span class="font-label-bold text-label-bold text-on-surface" style="font-size: 11px;">John</span>
</div>
<!-- Other Users -->
<div class="flex flex-col items-center flex-shrink-0 cursor-pointer opacity-70 hover:opacity-100 transition-opacity">
<div class="w-8 h-8 rounded-full bg-secondary-container flex items-center justify-center mb-1 mt-1">
<span class="font-title-main text-title-main text-on-secondary-container text-xs">AM</span>
</div>
<span class="font-label-bold text-label-bold text-on-surface-variant" style="font-size: 11px;">Alice</span>
</div>
<div class="flex flex-col items-center flex-shrink-0 cursor-pointer opacity-70 hover:opacity-100 transition-opacity">
<div class="w-8 h-8 rounded-full bg-tertiary-fixed flex items-center justify-center mb-1 mt-1">
<span class="font-title-main text-title-main text-on-tertiary-fixed text-xs">RK</span>
</div>
<span class="font-label-bold text-label-bold text-on-surface-variant" style="font-size: 11px;">Robert</span>
</div>
<div class="flex flex-col items-center flex-shrink-0 cursor-pointer opacity-70 hover:opacity-100 transition-opacity">
<div class="w-8 h-8 rounded-full bg-surface-variant flex items-center justify-center mb-1 mt-1">
<span class="material-symbols-outlined text-on-surface-variant" style="font-size: 16px;">add</span>
</div>
<span class="font-label-bold text-label-bold text-on-surface-variant" style="font-size: 11px;">Add</span>
</div>
</div>
</div>
<!-- PIN Dots -->
<div class="flex flex-row justify-center items-center gap-[14px] mb-8 w-full">
<div class="pin-dot pin-dot-filled shadow-sm"></div>
<div class="pin-dot pin-dot-filled shadow-sm"></div>
<div class="pin-dot pin-dot-empty shadow-sm"></div>
<div class="pin-dot pin-dot-empty shadow-sm"></div>
</div>
<!-- PIN Pad -->
<div class="grid grid-cols-3 gap-[10px] w-auto max-w-[234px] mx-auto pb-8">
<button class="pin-btn shadow-sm hover:bg-surface-container-low transition-colors">1</button>
<button class="pin-btn shadow-sm hover:bg-surface-container-low transition-colors">2</button>
<button class="pin-btn shadow-sm hover:bg-surface-container-low transition-colors">3</button>
<button class="pin-btn shadow-sm hover:bg-surface-container-low transition-colors">4</button>
<button class="pin-btn shadow-sm hover:bg-surface-container-low transition-colors">5</button>
<button class="pin-btn shadow-sm hover:bg-surface-container-low transition-colors">6</button>
<button class="pin-btn shadow-sm hover:bg-surface-container-low transition-colors">7</button>
<button class="pin-btn shadow-sm hover:bg-surface-container-low transition-colors">8</button>
<button class="pin-btn shadow-sm hover:bg-surface-container-low transition-colors">9</button>
<div class="w-[68px] h-[68px]"></div>
<button class="pin-btn shadow-sm hover:bg-surface-container-low transition-colors">0</button>
<button class="pin-btn shadow-sm hover:bg-surface-container-low transition-colors flex items-center justify-center">
<span class="material-symbols-outlined text-[#202124]">backspace</span>
</button>
</div>
</body></html>
