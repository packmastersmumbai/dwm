<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>

<title>TaskFlow - Admin Panel</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                        "inverse-primary": "#adc7ff",

                        "secondary-fixed-dim": "#6ddd81",

                    "fontFamily": {

<style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-surface text-on-surface font-body-standard text-body-standard min-h-screen pb-nav-height">
<!-- TopAppBar -->
<header class="flex justify-between items-center px-margin-edge w-full h-nav-height z-50 bg-surface border-b border-outline-variant shadow-sm sticky top-0 full-width">
<div class="flex items-center gap-3">

</div>
<div class="font-title-main-mobile text-title-main-mobile font-bold text-primary">TaskFlow</div>
<button class="text-primary hover:bg-surface-container-high transition-colors active:scale-95 transition-transform p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">search</span>
</button>
</header>
<main class="p-margin-edge space-y-6">
<!-- Page Title & Context -->
<div class="flex justify-between items-center">
<h1 class="font-title-main text-title-main text-on-surface">Admin Dashboard</h1>
<button class="w-8 h-8 rounded-full bg-surface-container-high flex items-center justify-center text-on-surface-variant hover:bg-surface-container-highest transition-colors">
<span class="material-symbols-outlined text-[20px]">more_vert</span>
</button>
</div>
<!-- Stats Row (Bento Grid Style) -->
<div class="grid grid-cols-2 gap-gutter-card">
<!-- Active -->
<div class="bg-surface-container-lowest rounded-xl p-4 shadow-sm border border-surface-container-low flex flex-col justify-between gap-2 relative overflow-hidden">
<div class="absolute -right-4 -top-4 w-16 h-16 bg-primary-fixed rounded-full opacity-20"></div>
<div class="w-8 h-8 rounded-full bg-primary-fixed flex items-center justify-center text-primary mb-1">
<span class="material-symbols-outlined text-[18px]" style="font-variation-settings: 'FILL' 1;">play_circle</span>
</div>
<div>
<div class="font-timer-display text-timer-display text-on-surface">142</div>
<div class="font-label-bold text-label-bold text-on-surface-variant mt-1">Active Tasks</div>
</div>
</div>
<!-- Live -->
<div class="bg-surface-container-lowest rounded-xl p-4 shadow-sm border border-surface-container-low flex flex-col justify-between gap-2 relative overflow-hidden">
<div class="absolute -right-4 -top-4 w-16 h-16 bg-secondary-container rounded-full opacity-20"></div>
<div class="w-8 h-8 rounded-full bg-secondary-container flex items-center justify-center text-secondary mb-1">
<span class="material-symbols-outlined text-[18px]" style="font-variation-settings: 'FILL' 1;">sensors</span>
</div>
<div>
<div class="font-timer-display text-timer-display text-on-surface">18</div>
<div class="font-label-bold text-label-bold text-on-surface-variant mt-1">Live Sessions</div>
</div>
</div>
<!-- Today -->
<div class="bg-surface-container-lowest rounded-xl p-4 shadow-sm border border-surface-container-low flex flex-col justify-between gap-2 relative overflow-hidden">
<div class="absolute -right-4 -top-4 w-16 h-16 bg-tertiary-fixed rounded-full opacity-20"></div>
<div class="w-8 h-8 rounded-full bg-tertiary-fixed flex items-center justify-center text-tertiary mb-1">
<span class="material-symbols-outlined text-[18px]" style="font-variation-settings: 'FILL' 1;">calendar_today</span>
</div>
<div>
<div class="font-timer-display text-timer-display text-on-surface">64</div>
<div class="font-label-bold text-label-bold text-on-surface-variant mt-1">Due Today</div>
</div>
</div>
<!-- Overdue -->
<div class="bg-surface-container-lowest rounded-xl p-4 shadow-sm border border-surface-container-low flex flex-col justify-between gap-2 relative overflow-hidden border-b-4 border-b-error">
<div class="absolute -right-4 -top-4 w-16 h-16 bg-error-container rounded-full opacity-20"></div>
<div class="w-8 h-8 rounded-full bg-error-container flex items-center justify-center text-error mb-1">
<span class="material-symbols-outlined text-[18px]" style="font-variation-settings: 'FILL' 1;">warning</span>
</div>
<div>
<div class="font-timer-display text-timer-display text-on-surface">12</div>
<div class="font-label-bold text-label-bold text-error mt-1">Overdue</div>
</div>
</div>
</div>
<!-- Tab Navigation -->
<div class="flex gap-6 border-b border-outline-variant overflow-x-auto no-scrollbar pb-2">
<button class="font-label-bold text-label-bold text-on-surface-variant whitespace-nowrap px-1 pb-2">Tasks</button>
<button class="font-label-bold text-label-bold text-primary border-b-2 border-primary whitespace-nowrap px-1 pb-2 relative">
                Workload
                <span class="absolute -top-1 -right-2 w-2 h-2 rounded-full bg-error"></span>
</button>
<button class="font-label-bold text-label-bold text-on-surface-variant whitespace-nowrap px-1 pb-2">Reports</button>
<button class="font-label-bold text-label-bold text-on-surface-variant whitespace-nowrap px-1 pb-2">Masters</button>
</div>
<!-- Workload Tab Content -->
<div class="space-y-4">
<!-- User Workload Card 1 (High Load) -->
<div class="bg-surface-container-lowest rounded-xl p-4 shadow-sm border border-surface-container-low border-l-4 border-l-error">
<div class="flex justify-between items-center mb-4">
<div class="flex items-center gap-3">
<img alt="Elena Rodriguez" class="w-10 h-10 rounded-full object-cover" data-alt="A professional headshot of a female team member in a corporate setting. She appears focused and confident. The lighting is soft and natural, fitting a modern light-mode dashboard interface aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCNUnppM-mixjYsIVBYKm81Bf2rXUFSsVBRsHxCFJI6UXSBOtYASkrMPX7peRnHSzQvCkK7IFHJs9Fe0skqY54NurYOTHlqGv1_zXFLb14UXtqpDDcGjnhzUoXtbLNj8oj-GIAw-uN7IBsWlyxVJD6wjsKtE7oYC2q-Kct1XccGDEWxKj4t7B_aQHKOIsFFUcYqktrAmOYB9rWGwEFv1C4LUe-gLkgDCb3qmG4sKkk3GovBrcsEgy96JNyE8iOjVTbFCik4qGlsuSmw"/>
<div>
<div class="font-body-standard text-body-standard font-semibold text-on-surface">Elena Rodriguez</div>
<div class="font-label-bold text-label-bold text-on-surface-variant">Design Lead</div>
</div>
</div>
<div class="text-right">
<div class="font-body-standard text-body-standard font-bold text-on-surface">38h</div>
<div class="font-label-bold text-label-bold text-on-surface-variant">logged</div>
</div>
</div>
<!-- Capacity Bar -->
<div class="w-full h-3 rounded-full bg-surface-container-high flex overflow-hidden">
<div class="h-full bg-error transition-all" style="width: 45%;"></div>
<div class="h-full bg-tertiary transition-all" style="width: 30%;"></div>
<div class="h-full bg-tertiary-fixed-dim transition-all" style="width: 15%;"></div>
<div class="h-full bg-secondary transition-all" style="width: 5%;"></div>
</div>
</div>
<!-- User Workload Card 2 (Balanced Load) -->
<div class="bg-surface-container-lowest rounded-xl p-4 shadow-sm border border-surface-container-low border-l-4 border-l-tertiary">
<div class="flex justify-between items-center mb-4">
<div class="flex items-center gap-3">
<img alt="Marcus Chen" class="w-10 h-10 rounded-full object-cover" data-alt="A professional headshot of a male developer. He looks approachable and engaged. The image is brightly lit, perfectly matching a clean, white corporate dashboard UI environment." src="https://lh3.googleusercontent.com/aida-public/AB6AXuD4H5K6ZtoUJweLvUPCeaaMP5-vicugDJ0zSdHyL-DtH5v8y6RzwRR_ZCPlfdaqIQl41teRoYV9RvurQ0NdsKuRicm0BoABXbJolSqO_F-1WvmHiOnuTFsc3f2jFVOtpDIF-7cw3MXCcUBSZAYvmA58pjCL3QdOAhZjSJCkfKmBSaHs4OMRSUIM8bQlBtyr5tFGtuXY42asjtiicA1hNVIOsZK8Y6Mna3AsonD2oAk1ZqCKGL4-8RGMe5jt2xgLCWGAxcAhqkf6yD0j"/>
<div>
<div class="font-body-standard text-body-standard font-semibold text-on-surface">Marcus Chen</div>
<div class="font-label-bold text-label-bold text-on-surface-variant">Frontend Dev</div>
</div>
</div>
<div class="text-right">
<div class="font-body-standard text-body-standard font-bold text-on-surface">24h</div>
<div class="font-label-bold text-label-bold text-on-surface-variant">logged</div>
</div>
</div>
<!-- Capacity Bar -->
<div class="w-full h-3 rounded-full bg-surface-container-high flex overflow-hidden">
<div class="h-full bg-error transition-all" style="width: 10%;"></div>
<div class="h-full bg-tertiary transition-all" style="width: 40%;"></div>
<div class="h-full bg-tertiary-fixed-dim transition-all" style="width: 30%;"></div>
<div class="h-full bg-secondary transition-all" style="width: 15%;"></div>
</div>
</div>
<!-- User Workload Card 3 (Light Load) -->
<div class="bg-surface-container-lowest rounded-xl p-4 shadow-sm border border-surface-container-low border-l-4 border-l-secondary">
<div class="flex justify-between items-center mb-4">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-primary-fixed flex items-center justify-center text-primary font-bold">
                            SK
                        </div>
<div>
<div class="font-body-standard text-body-standard font-semibold text-on-surface">Sarah Kim</div>
<div class="font-label-bold text-label-bold text-on-surface-variant">Copywriter</div>
</div>
</div>
<div class="text-right">
<div class="font-body-standard text-body-standard font-bold text-on-surface">12h</div>
<div class="font-label-bold text-label-bold text-on-surface-variant">logged</div>
</div>
</div>
<!-- Capacity Bar -->
<div class="w-full h-3 rounded-full bg-surface-container-high flex overflow-hidden">
<div class="h-full bg-error transition-all" style="width: 0%;"></div>
<div class="h-full bg-tertiary transition-all" style="width: 10%;"></div>
<div class="h-full bg-tertiary-fixed-dim transition-all" style="width: 20%;"></div>
<div class="h-full bg-secondary transition-all" style="width: 40%;"></div>
</div>
</div>
<!-- Priority Legend -->
<div class="flex flex-wrap gap-4 mt-6 p-4 bg-surface-container-low rounded-xl border border-outline-variant">
<div class="w-full font-label-bold text-label-bold text-on-surface-variant mb-1">Capacity Priority Legend</div>
<div class="flex items-center gap-2">
<span class="w-3 h-3 rounded-full bg-error"></span>
<span class="font-label-bold text-label-bold text-on-surface">Urgent</span>
</div>
<div class="flex items-center gap-2">
<span class="w-3 h-3 rounded-full bg-tertiary"></span>
<span class="font-label-bold text-label-bold text-on-surface">High</span>
</div>
<div class="flex items-center gap-2">
<span class="w-3 h-3 rounded-full bg-tertiary-fixed-dim"></span>
<span class="font-label-bold text-label-bold text-on-surface">Medium</span>
</div>
<div class="flex items-center gap-2">
<span class="w-3 h-3 rounded-full bg-secondary"></span>
<span class="font-label-bold text-label-bold text-on-surface">Low</span>
</div>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="flex justify-around items-center w-full h-nav-height px-2 bg-surface fixed bottom-0 z-50 border-t border-outline-variant shadow-lg">
<button class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-1 hover:bg-surface-container-low active:scale-90 transition-all duration-200">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">home</span>
<span class="font-label-bold text-label-bold">Home</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-1 hover:bg-surface-container-low active:scale-90 transition-all duration-200">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">calendar_today</span>
<span class="font-label-bold text-label-bold">My Day</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-1 hover:bg-surface-container-low active:scale-90 transition-all duration-200">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">group</span>
<span class="font-label-bold text-label-bold">Team</span>
</button>
<button class="flex flex-col items-center justify-center bg-secondary-container text-on-secondary-container rounded-2xl px-4 py-1 hover:bg-surface-container-low active:scale-90 transition-all duration-200">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">settings</span>
<span class="font-label-bold text-label-bold">Admin</span>
</button>
</nav>
