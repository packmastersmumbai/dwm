<div data-screen="daily-plan">
<!-- Header -->
<header class="bg-primary-container h-[80px] px-margin-edge flex justify-between items-center text-on-primary-container shrink-0">
<div>
<h1 id="dp-greeting" class="text-[20px] font-semibold leading-tight">Good morning 👋</h1>
<p id="dp-date" class="text-[13px] opacity-70 mt-1"></p>
</div>
<div class="flex items-center gap-4">
<button id="dp-skip" class="text-[13px] text-on-primary-container font-medium hover:underline flex items-center gap-1">
Skip <span class="material-symbols-outlined text-[16px]">arrow_forward</span>
</button>
<img id="dp-avatar" alt="User Avatar" class="w-9 h-9 rounded-full border-2 border-on-primary-container" src=""/>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 flex flex-col gap-6 p-margin-edge w-full max-w-3xl mx-auto overflow-y-auto">
<!-- Overdue Section -->
<section class="flex flex-col gap-3">
<div class="flex items-center justify-between">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-error text-[20px]">warning</span>
<h2 class="font-title-main text-title-main text-error">OVERDUE</h2>
</div>
<span class="text-[12px] text-[#EA4335] bg-[#FEF3F2] px-2 py-1 rounded-full font-medium">Deal with these first</span>
</div>
<div id="dp-overdue-list" class="flex flex-col gap-3">
<!-- Skeleton placeholder -->
<div class="tf-skeleton h-[72px] w-full opacity-60"></div>
<div class="tf-skeleton h-[72px] w-full opacity-40"></div>
</div>
</section>
<!-- Today Section -->
<section class="flex flex-col gap-3 mt-4">
<div class="flex items-center justify-between border-b border-outline-variant pb-2">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary-container text-[20px]">calendar_today</span>
<h2 class="font-title-main text-title-main text-on-surface">TODAY</h2>
</div>
<span id="dp-today-count" class="text-[12px] text-on-surface-variant font-medium"></span>
</div>
<div id="dp-today-list" class="flex flex-col gap-3">
<!-- Skeleton placeholders -->
<div class="tf-skeleton h-[72px] w-full opacity-60"></div>
<div class="tf-skeleton h-[72px] w-full opacity-50"></div>
<div class="tf-skeleton h-[72px] w-full opacity-40"></div>
</div>
</section>
<!-- Bottom spacing for fixed action bar + bottom nav -->
<div class="h-28"></div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full h-nav-height z-50 border-t border-outline-variant shadow-lg flex justify-around items-center px-2 bg-surface">
  <button class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-1 cursor-pointer hover:bg-surface-container-low active:scale-90 transition-all duration-200 rounded-xl focus-visible:ring-2 ring-primary" data-dp-nav="kanban-home">
    <span class="material-symbols-outlined">home</span>
    <span class="font-label-bold text-label-bold mt-0.5">Home</span>
  </button>
  <button class="flex flex-col items-center justify-center bg-secondary-container text-on-secondary-container rounded-2xl px-4 py-1 cursor-pointer active:scale-90 transition-all duration-200 focus-visible:ring-2 ring-primary" data-dp-nav="myday-share">
    <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">calendar_today</span>
    <span class="font-label-bold text-label-bold mt-0.5">My Day</span>
  </button>
  <button class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-1 cursor-pointer hover:bg-surface-container-low active:scale-90 transition-all duration-200 rounded-xl focus-visible:ring-2 ring-primary" data-dp-nav="team-board">
    <span class="material-symbols-outlined">group</span>
    <span class="font-label-bold text-label-bold mt-0.5">Team</span>
  </button>
  <button class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-1 cursor-pointer hover:bg-surface-container-low active:scale-90 transition-all duration-200 rounded-xl focus-visible:ring-2 ring-primary" data-dp-nav="admin-panel">
    <span class="material-symbols-outlined">settings</span>
    <span class="font-label-bold text-label-bold mt-0.5">Admin</span>
  </button>
  <button class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-1 cursor-pointer hover:bg-surface-container-low active:scale-90 transition-all duration-200 rounded-xl focus-visible:ring-2 ring-primary" data-dp-nav="reports-kpi">
    <span class="material-symbols-outlined">bar_chart</span>
    <span class="font-label-bold text-label-bold mt-0.5">Reports</span>
  </button>
</nav>

<!-- Bottom Action Bar (Sticky) — sits above bottom nav -->
<div class="fixed w-full bg-surface-container-lowest border-t border-outline-variant shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] p-4 z-40 flex items-center justify-between max-w-3xl left-1/2 -translate-x-1/2" style="bottom:56px">
<div id="dp-task-count-label" class="text-[13px] text-[#5F6368] font-medium flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]">format_list_bulleted</span>
Loading…
</div>
<button id="dp-begin-btn" class="bg-primary-container text-on-primary-container px-6 py-2.5 rounded-lg font-semibold text-[14px] flex items-center gap-2 hover:bg-primary transition-colors shadow-sm">
Begin My Day <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</div>
</div>

<script>
APP.register('daily-plan', {
  _tasks: [],

  mount: function(params) {
    if (!APP.currentUser) { APP.navigate('pin-login'); return; }
    var self = this;
    var screen = document.querySelector('[data-screen="daily-plan"]');
    var today = new Date();

    // Populate header
    var userName = APP.currentUser.name || 'there';
    var hour = today.getHours();
    var greeting = hour < 12 ? 'Good morning' : (hour < 17 ? 'Good afternoon' : 'Good evening');
    screen.querySelector('#dp-greeting').textContent = greeting + ', ' + userName + ' 👋';

    var days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    screen.querySelector('#dp-date').textContent = days[today.getDay()] + ', ' + months[today.getMonth()] + ' ' + today.getDate();

    var _dpAvatarEl = screen.querySelector('#dp-avatar');
    if (_dpAvatarEl) {
      if (APP.currentUser.avatar) {
        _dpAvatarEl.src = APP.currentUser.avatar;
      } else {
        var _dpIni = (APP.currentUser.name || 'U').split(' ').map(function(w){return w[0];}).join('').toUpperCase().slice(0,2);
        _dpAvatarEl.outerHTML = '<div class="w-9 h-9 rounded-full border-2 border-on-primary-container bg-primary flex items-center justify-center text-white text-[13px] font-bold shrink-0">' + _dpIni + '</div>';
      }
    }

    // Bottom nav
    screen.querySelectorAll('[data-dp-nav]').forEach(function(btn) {
      btn.addEventListener('click', function() {
        APP.navigate(btn.getAttribute('data-dp-nav'));
      });
    });

    // Skip button
    screen.querySelector('#dp-skip').addEventListener('click', function() {
      APP.navigate('myday-share');
    });

    // Begin My Day button
    screen.querySelector('#dp-begin-btn').addEventListener('click', function() {
      APP.call('beginMyDay', APP.token)
        .then(function() { APP.navigate('myday-share'); })
        .catch(function(err) { APP.showError(err); });
    });

    // Load plan
    var todayStr = today.toISOString().slice(0, 10);
    APP.call('getDailyPlan', APP.currentUser.id, todayStr)
      .then(function(tasks) {
        self._tasks = tasks || [];
        self._render(screen);
      })
      .catch(function(err) { APP.showError(err); });
  },

  unmount: function() {
    this._tasks = [];
  },

  _render: function(screen) {
    var self = this;
    var overdue = self._tasks.filter(function(t) { return t.isOverdue; });
    var today = self._tasks.filter(function(t) { return !t.isOverdue; });

    screen.querySelector('#dp-today-count').textContent = today.length + ' task' + (today.length !== 1 ? 's' : '') + ' scheduled';
    screen.querySelector('#dp-task-count-label').innerHTML =
      '<span class="material-symbols-outlined text-[18px]">format_list_bulleted</span> ' +
      self._tasks.length + ' task' + (self._tasks.length !== 1 ? 's' : '') + ' to tackle';

    screen.querySelector('#dp-overdue-list').innerHTML = overdue.length
      ? overdue.map(function(t) { return self._taskCard(t, true); }).join('')
      : '<p class="text-sm text-on-surface-variant opacity-70">No overdue tasks. Great job!</p>';

    screen.querySelector('#dp-today-list').innerHTML = today.length
      ? today.map(function(t) { return self._taskCard(t, false); }).join('')
      : '<p class="text-sm text-on-surface-variant opacity-70">No tasks scheduled for today.</p>';

    self._bindCardEvents(screen);
  },

  _taskCard: function(task, isOverdue) {
    var isLow = !isOverdue && (task.priority === 'low' || task.optional);
    var borderColor = isOverdue ? 'border-error' : (isLow ? 'border-outline' : 'border-[#FBBC04]');
    var dotColor = isOverdue ? 'bg-error' : (isLow ? 'bg-outline' : 'bg-[#FBBC04]');
    var opacityClass = isLow ? ' opacity-80' : '';
    var lateBadge = isOverdue
      ? '<span class="text-[11px] font-bold text-error flex items-center gap-1"><span class="material-symbols-outlined text-[14px]">schedule</span> ' + (task.daysLate || '?') + 'd late</span>'
      : (task.scheduledTime ? '<span class="text-[11px] text-on-surface-variant flex items-center gap-1"><span class="material-symbols-outlined text-[14px]">schedule</span> ' + task.scheduledTime + '</span>' : '');
    var clientBadge = task.client ? '<span class="text-[11px] font-medium px-2 py-0.5 bg-surface-variant text-on-surface-variant rounded-md">' + task.client + '</span>' : '';

    return '<div class="bg-surface-container-lowest rounded-lg p-4 shadow-sm border-l-4 ' + borderColor + ' flex flex-col sm:flex-row sm:items-center justify-between gap-4' + opacityClass + '">' +
      '<div class="flex items-start gap-3">' +
        '<div class="w-3 h-3 rounded-full ' + dotColor + ' mt-1.5 shrink-0"></div>' +
        '<div>' +
          '<h3 class="font-medium text-[14px] leading-tight mb-1 text-on-surface">' + (task.title || 'Untitled') + '</h3>' +
          '<div class="flex items-center gap-2 flex-wrap">' + clientBadge + lateBadge + '</div>' +
        '</div>' +
      '</div>' +
      '<div class="flex items-center gap-2 self-end sm:self-auto shrink-0">' +
        '<button class="dp-defer-btn px-3 py-1.5 border border-outline-variant text-on-surface-variant text-[12px] font-medium rounded-full hover:bg-surface-container-low transition-colors flex items-center gap-1" data-task-id="' + task.id + '">' +
          '<span class="material-symbols-outlined text-[16px]">forward</span> Tomorrow' +
        '</button>' +
        '<button class="dp-start-btn px-3 py-1.5 bg-surface-tint text-on-primary text-[12px] font-medium rounded-full hover:bg-primary transition-colors flex items-center gap-1 shadow-sm" data-task-id="' + task.id + '">' +
          '<span class="material-symbols-outlined text-[16px]">play_arrow</span> Start' +
        '</button>' +
        '<button class="dp-done-btn w-8 h-8 flex items-center justify-center border border-outline-variant text-outline rounded-full hover:bg-secondary-container hover:text-on-secondary-container hover:border-transparent transition-colors" data-task-id="' + task.id + '">' +
          '<span class="material-symbols-outlined text-[18px]">check</span>' +
        '</button>' +
      '</div>' +
    '</div>';
  },

  _bindCardEvents: function(screen) {
    var self = this;

    screen.querySelectorAll('.dp-defer-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var taskId = btn.getAttribute('data-task-id');
        APP.call('deferTask', taskId)
          .then(function() {
            self._tasks = self._tasks.filter(function(t) { return t.id !== taskId; });
            self._render(screen);
            APP.showSuccess('Task deferred to tomorrow');
          })
          .catch(function(err) { APP.showError(err); });
      });
    });

    screen.querySelectorAll('.dp-start-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var taskId = btn.getAttribute('data-task-id');
        APP.call('startTimer', taskId, APP.token)
          .then(function() { APP.navigate('myday-share'); })
          .catch(function(err) { APP.showError(err); });
      });
    });

    screen.querySelectorAll('.dp-done-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var taskId = btn.getAttribute('data-task-id');
        APP.call('markTaskDone', taskId, APP.token)
          .then(function() {
            self._tasks = self._tasks.filter(function(t) { return t.id !== taskId; });
            self._render(screen);
            APP.showSuccess('Task marked done');
          })
          .catch(function(err) { APP.showError(err); });
      });
    });
  }
});
</script>
